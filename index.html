<!doctype html>
<!-- cache refresh nudge 2026-07-12 -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Roadbook</title>
<link rel="manifest" href="data:application/manifest+json,{}">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --sand:#F4E9D8;
    --sand-dark:#EADBC2;
    --sand-darker:#DFC9A5;
    --card:#FFFBF3;
    --ink:#3A2A1E;
    --ink-soft:#8A7660;
    --terracotta:#C1603C;
    --terracotta-dark:#A94E2E;
    --terracotta-ink:#FFF6EF;
    --rust:#A8452A;
    --ochre:#D69A34;
    --eucalypt:#6B8552;
    --plum:#7C5C7A;
    --line:#E3D2B4;
    --danger:#A8452A;
    --radius:14px;
    --radius-sm:9px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--sand);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
    padding-bottom:calc(92px + env(safe-area-inset-bottom));
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }
  :focus-visible{outline:2px solid var(--terracotta); outline-offset:2px;}
  h1,h2,h3{margin:0;}

  header.top{
    position:sticky; top:0; z-index:20;
    background:var(--sand);
    padding:16px 16px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  header.top h1{font-size:19px; font-weight:800; letter-spacing:-0.01em;}
  header.top .screenlabel{font-size:12px; color:var(--ink-soft); font-weight:600;}
  header.top .hdrright{display:flex; align-items:center; gap:10px;}
  .syncbtn{
    background:var(--card); border:1.5px solid var(--line); border-radius:50%;
    width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    font-size:16px; cursor:pointer; color:var(--terracotta-dark); padding:0;
  }
  .syncbtn.spinning{animation:rbspin 0.9s linear infinite;}
  @keyframes rbspin{to{transform:rotate(360deg);}}

  main{padding:6px 16px 8px;}

  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:12px;
    box-shadow:0 1px 2px rgba(58,42,30,0.08);
  }
  .greetcard{
    background:linear-gradient(135deg, var(--terracotta), var(--ochre));
    color:var(--terracotta-ink);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
  }
  .greetcard .eyebrow{font-size:11px; opacity:0.85; font-weight:600; letter-spacing:0.02em;}
  .greetcard h2{font-size:20px; margin-top:2px;}
  .greetcard .sub{font-size:12.5px; opacity:0.9; margin-top:2px;}

  .statrow{display:flex; gap:8px; margin-bottom:14px;}
  .statchip{
    flex:1; background:var(--card); border-radius:var(--radius-sm); padding:9px 6px; text-align:center;
    box-shadow:0 1px 2px rgba(58,42,30,0.06);
  }
  .statchip .val{font-size:16px; font-weight:800;}
  .statchip .lbl{font-size:9.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; margin-top:1px;}

  .sectitle{font-size:13px; font-weight:800; margin:6px 2px 8px; color:var(--ink);}

  .tilegrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .tile{
    background:var(--card); border-radius:var(--radius); padding:14px 12px; cursor:pointer;
    box-shadow:0 1px 2px rgba(58,42,30,0.08); text-align:left;
  }
  .tile .icon{font-size:20px;}
  .tile .label{font-size:12.5px; font-weight:700; margin-top:6px;}
  .tile .desc{font-size:10.5px; color:var(--ink-soft); margin-top:1px;}

  .tipcard{
    background:var(--sand-dark); border-radius:var(--radius); padding:14px; font-size:12.5px; color:var(--ink);
    margin-bottom:14px;
  }
  .tipcard .lbl{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.06em; color:var(--terracotta-dark); margin-bottom:4px;}

  .empty{
    padding:34px 12px; text-align:center; color:var(--ink-soft); font-size:13px;
    border:1.5px dashed var(--line); border-radius:var(--radius);
  }
  .empty .t{display:block; font-size:14px; font-weight:800; margin-bottom:6px; color:var(--ink);}

  .row{
    display:flex; gap:10px; padding:12px; margin-bottom:8px; cursor:pointer;
    background:var(--card); border-radius:var(--radius-sm); box-shadow:0 1px 2px rgba(58,42,30,0.06);
  }
  .row:active{background:var(--sand-dark);}
  .row .tag{flex:0 0 5px; border-radius:3px;}
  .row .body{flex:1; min-width:0;}
  .row .rowtop{display:flex; justify-content:space-between; gap:8px; align-items:baseline;}
  .row .kind{font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; font-weight:800;}
  .row .date{font-size:10px; color:var(--ink-soft); font-family:ui-monospace,monospace;}
  .row .note{font-size:13.5px; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .row .meta{font-size:10.5px; color:var(--ink-soft); margin-top:2px;}
  .row .amount{font-family:ui-monospace,monospace; font-weight:800; font-size:14px; white-space:nowrap;}

  .tag.campsite{background:var(--eucalypt);}
  .tag.fuel{background:var(--rust);}
  .tag.poi{background:var(--ochre);}
  .tag.note{background:var(--ink-soft);}
  .kind.campsite{color:var(--eucalypt);}
  .kind.fuel{color:var(--rust);}
  .kind.poi{color:var(--ochre);}
  .kind.note{color:var(--ink-soft);}

  .photogrid{display:grid; grid-template-columns:repeat(3,1fr); gap:5px;}
  .photogrid .thumb{
    aspect-ratio:1; overflow:hidden; background:var(--sand-dark); border-radius:var(--radius-sm);
    position:relative; cursor:pointer;
  }
  .photogrid img{width:100%; height:100%; object-fit:cover; display:block;}

  .fab{
    position:fixed; right:18px; bottom:78px; z-index:25;
    width:56px; height:56px; border-radius:50%;
    background:var(--terracotta); color:var(--terracotta-ink);
    border:none; font-size:26px; font-weight:400;
    box-shadow:0 3px 10px rgba(168,69,42,0.4);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .fab:active{transform:scale(0.94);}

  nav.tabs{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    display:flex; background:var(--card);
    border-top:1px solid var(--line);
    padding:6px 2px calc(6px + env(safe-area-inset-bottom));
  }
  nav.tabs button{
    flex:1; background:none; border:none; padding:6px 2px;
    font-size:9.5px; font-weight:700; letter-spacing:0.01em;
    color:var(--ink-soft); cursor:pointer; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  nav.tabs button .ic{font-size:18px;}
  nav.tabs button.active{color:var(--terracotta-dark);}

  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(58,42,30,0.45); z-index:40;
    opacity:0; pointer-events:none; transition:opacity 0.18s ease;
  }
  .sheet-backdrop.open{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:41;
    background:var(--sand);
    border-radius:18px 18px 0 0;
    max-height:88vh; overflow-y:auto;
    transform:translateY(100%);
    transition:transform 0.22s ease;
    padding:18px 16px calc(20px + env(safe-area-inset-bottom));
  }
  .sheet.open{transform:translateY(0);}
  .sheet h2{font-size:16px; margin-bottom:14px;}
  .sheet .closebtn{
    position:absolute; top:12px; right:14px; background:none; border:none;
    font-size:18px; color:var(--ink-soft); cursor:pointer; padding:4px;
  }

  .field{margin-bottom:12px;}
  .field label{
    display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--ink-soft); margin-bottom:5px; font-weight:800;
  }
  .field input[type=text], .field input[type=number], .field input[type=date], .field textarea, .field select{
    width:100%; padding:10px 11px; border:1.5px solid var(--line); background:var(--card);
    font-size:14px; font-family:inherit; color:var(--ink); border-radius:var(--radius-sm);
  }
  .field textarea{resize:vertical; min-height:60px;}
  .typegrid{display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}
  .typegrid button{
    padding:9px 2px; border:1.5px solid var(--line); background:var(--card); border-radius:var(--radius-sm);
    font-size:9.5px; text-transform:uppercase; letter-spacing:0.04em; font-weight:800; cursor:pointer;
    color:var(--ink-soft); font-family:inherit;
  }
  .typegrid button.selected{background:var(--terracotta); border-color:var(--terracotta); color:var(--terracotta-ink);}

  .geobtn, .photobtn{
    width:100%; padding:11px; border:1.5px dashed var(--line); background:none; border-radius:var(--radius-sm);
    font-size:12.5px; cursor:pointer; color:var(--ink); font-family:inherit; text-align:left;
  }
  .geobtn.got, .photobtn.got{border-style:solid; background:var(--card);}
  .geo-readout{font-family:ui-monospace,monospace; font-size:11px; color:var(--ink-soft); margin-top:4px;}

  .thumbrow{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
  .thumbrow .t{width:56px; height:56px; border-radius:var(--radius-sm); border:1px solid var(--line); overflow:hidden;}
  .thumbrow .t img{width:100%; height:100%; object-fit:cover;}

  .actions{display:flex; gap:8px; margin-top:16px;}
  .btn{
    flex:1; padding:13px; border:none; border-radius:var(--radius-sm); font-size:12.5px;
    text-transform:uppercase; letter-spacing:0.05em; font-weight:800; cursor:pointer; font-family:inherit;
  }
  .btn.primary{background:var(--terracotta); color:var(--terracotta-ink);}
  .btn.ghost{background:none; border:1.5px solid var(--ink); color:var(--ink);}
  .btn.danger{background:var(--danger); color:#FFF1EC;}

  .block{border-radius:var(--radius); padding:15px; margin-bottom:12px; background:var(--card); box-shadow:0 1px 2px rgba(58,42,30,0.06);}
  .block h3{font-size:12.5px; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px;}
  .block p{font-size:12px; color:var(--ink-soft); margin:0 0 10px;}

  .menurow{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:15px; background:var(--card); border-radius:var(--radius); margin-bottom:10px; cursor:pointer;
    box-shadow:0 1px 2px rgba(58,42,30,0.06);
  }
  .menurow .left{display:flex; align-items:center; gap:12px;}
  .menurow .ic{font-size:20px;}
  .menurow .label{font-size:13.5px; font-weight:700;}
  .menurow .chev{color:var(--ink-soft); font-size:16px;}
  .backrow{display:flex; align-items:center; gap:8px; margin-bottom:12px; cursor:pointer;}
  .backrow .arrow{font-size:16px;}
  .backrow .label{font-size:13px; font-weight:700; color:var(--ink-soft);}

  .badge{
    display:inline-block; padding:3px 9px; border-radius:20px; font-size:9.5px; font-weight:800;
    text-transform:uppercase; letter-spacing:0.04em;
  }
  .badge.planning{background:var(--sand-darker); color:var(--terracotta-dark);}
  .badge.active{background:var(--terracotta); color:var(--terracotta-ink);}
  .badge.completed{background:var(--eucalypt); color:#F1F6EC;}

  .tripcard{background:var(--card); border-radius:var(--radius); padding:14px; margin-bottom:10px; cursor:pointer; box-shadow:0 1px 2px rgba(58,42,30,0.06);}
  .tripcard .toprow{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .tripcard .name{font-size:14.5px; font-weight:800;}
  .tripcard .dates{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .tripcard .stopcount{font-size:11px; color:var(--ink-soft); margin-top:6px;}

  .stoplistitem{display:flex; align-items:center; gap:8px; background:var(--card); border-radius:var(--radius-sm); padding:9px 10px; margin-bottom:6px;}
  .stoplistitem .num{font-family:ui-monospace,monospace; font-size:11px; color:var(--ink-soft); flex:0 0 16px;}
  .stoplistitem .nm{flex:1; font-size:13px;}
  .stoplistitem button{background:none; border:none; color:var(--ink-soft); font-size:15px; cursor:pointer; padding:2px 5px;}

  .vehform{margin-bottom:6px;}
  .toast{
    position:fixed; left:50%; bottom:100px; transform:translateX(-50%);
    background:var(--ink); color:var(--sand); padding:10px 18px; font-size:12.5px;
    border-radius:10px; z-index:60; opacity:0; pointer-events:none; transition:opacity 0.2s ease;
  }
  .toast.show{opacity:1;}
  input[type=file]{display:none;}
  .recbar{
    background:var(--card); border-radius:var(--radius); padding:13px 14px; margin-bottom:12px;
    display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 2px rgba(58,42,30,0.06);
  }
  .recbar.live{background:var(--terracotta); color:var(--terracotta-ink);}
  .recbar .readout{font-family:ui-monospace,monospace; font-size:13px; font-weight:700;}
</style>
</head>
<body>

<header class="top">
  <h1>Roadbook</h1>
  <div class="hdrright">
    <span class="screenlabel" id="screenLabel">Home</span>
    <button class="syncbtn" id="syncBtn" title="Sync now">🔄</button>
  </div>
</header>

<main id="main"></main>

<button class="fab" id="fab">+</button>

<nav class="tabs">
  <button data-tab="home" class="active"><span class="ic">🏠</span>Home</button>
  <button data-tab="log"><span class="ic">📍</span>Log</button>
  <button data-tab="trips"><span class="ic">🗺️</span>Trips</button>
  <button data-tab="van"><span class="ic">🚐</span>Van</button>
  <button data-tab="more"><span class="ic">⋯</span>More</button>
</nav>

<div class="sheet-backdrop" id="backdrop"></div>

<!-- Log entry sheet -->
<div class="sheet" id="sheetLog">
  <button class="closebtn" data-close>✕</button>
  <h2>New stop</h2>
  <div class="field">
    <label>Type</label>
    <div class="typegrid" id="typeGrid">
      <button data-type="campsite" class="selected">Campsite</button>
      <button data-type="poi">Point of interest</button>
      <button data-type="fuel">Fuel stop</button>
      <button data-type="note">Note</button>
    </div>
  </div>
  <div class="field">
    <label>Note</label>
    <textarea id="logNote" placeholder="What's here — site number, view, conditions..."></textarea>
  </div>
  <div class="field">
    <label>Location</label>
    <button class="geobtn" id="logGeoBtn">📍 Capture current location</button>
    <div class="geo-readout" id="logGeoReadout"></div>
  </div>
  <div class="field">
    <label>Photos</label>
    <button class="photobtn" id="logPhotoBtn">📷 Add photo</button>
    <input type="file" id="logPhotoInput" accept="image/*" capture="environment" multiple>
    <div class="thumbrow" id="logThumbs"></div>
  </div>
  <div class="actions">
    <button class="btn ghost" data-close>Cancel</button>
    <button class="btn primary" id="logSave">Save stop</button>
  </div>
</div>

<!-- Expense sheet -->
<div class="sheet" id="sheetSpend">
  <button class="closebtn" data-close>✕</button>
  <h2>New expense</h2>
  <div class="field">
    <label>Category</label>
    <div class="typegrid" id="catGrid">
      <button data-cat="Fuel" class="selected">Fuel</button>
      <button data-cat="Camp fees">Camp fees</button>
      <button data-cat="Food">Food</button>
      <button data-cat="Repairs">Repairs</button>
      <button data-cat="Other">Other</button>
    </div>
  </div>
  <div class="field">
    <label>Amount ($)</label>
    <input type="number" id="spendAmount" inputmode="decimal" step="0.01" placeholder="0.00">
  </div>
  <div class="field">
    <label>Litres</label>
    <input type="number" id="spendLitres" inputmode="decimal" step="0.01" placeholder="optional">
  </div>
  <div class="field">
    <label>Fuel type</label>
    <input type="text" id="spendFuelType" placeholder="optional — e.g. Diesel, Unleaded 91">
  </div>
  <div class="field">
    <label>Odometer (km)</label>
    <input type="number" id="spendOdo" inputmode="numeric" placeholder="optional">
  </div>
  <div class="field">
    <label>Note</label>
    <input type="text" id="spendNote" placeholder="optional">
  </div>
  <div class="field">
    <label>Location</label>
    <button class="geobtn" id="spendGeoBtn">📍 Capture current location</button>
    <div class="geo-readout" id="spendGeoReadout"></div>
  </div>
  <div class="field">
    <label>Photos</label>
    <button class="photobtn" id="spendPhotoBtn">📷 Add photo</button>
    <input type="file" id="spendPhotoInput" accept="image/*" capture="environment" multiple>
    <div class="thumbrow" id="spendThumbs"></div>
    <button class="photobtn" id="spendScanBtn" style="margin-top:6px;">🧾 Scan receipt for details</button>
  </div>
  <div class="actions">
    <button class="btn ghost" data-close>Cancel</button>
    <button class="btn primary" id="spendSave">Save expense</button>
  </div>
</div>

<!-- Trip sheet -->
<div class="sheet" id="sheetTrip">
  <button class="closebtn" data-close>✕</button>
  <h2 id="tripSheetTitle">New trip</h2>
  <div class="field">
    <label>Trip name</label>
    <input type="text" id="tripName" placeholder="e.g. Gulf loop, Cape trip...">
  </div>
  <div class="field">
    <label>Start date</label>
    <input type="date" id="tripStart">
  </div>
  <div class="field">
    <label>End date</label>
    <input type="date" id="tripEnd">
  </div>
  <div class="field">
    <label>Status</label>
    <div class="typegrid" id="tripStatusGrid" style="grid-template-columns:repeat(3,1fr);">
      <button data-status="planning" class="selected">Planning</button>
      <button data-status="active">Active</button>
      <button data-status="completed">Completed</button>
    </div>
  </div>
  <div class="field">
    <label>Notes</label>
    <textarea id="tripNotes" placeholder="optional"></textarea>
  </div>
  <div class="field">
    <label>Stops (in order)</label>
    <div id="tripStopList"></div>
    <div style="display:flex; gap:6px; margin-top:6px;">
      <input type="text" id="tripStopName" placeholder="Stop name" style="flex:1; padding:9px 10px; border:1.5px solid var(--line); border-radius:9px; font-size:13px;">
      <button class="btn ghost" id="tripStopAddHere" style="flex:0 0 auto; padding:9px 12px;">📍 Here</button>
      <button class="btn primary" id="tripStopAdd" style="flex:0 0 auto; padding:9px 14px;">Add</button>
    </div>
  </div>
  <div class="actions">
    <button class="btn ghost" data-close>Cancel</button>
    <button class="btn primary" id="tripSave">Save trip</button>
  </div>
</div>

<!-- Link a past (unrecorded) trip sheet -->
<div class="sheet" id="sheetLinkRoute">
  <button class="closebtn" data-close>✕</button>
  <h2>Link a past trip</h2>
  <div class="field">
    <label>Route name</label>
    <input type="text" id="linkRouteName" placeholder="e.g. Gulf loop 2023">
  </div>
  <div class="field">
    <label>Date</label>
    <input type="date" id="linkRouteDate">
  </div>
  <div class="field">
    <label>Link</label>
    <input type="text" id="linkRouteUrl" placeholder="Google Maps, Strava, photo album...">
  </div>
  <div class="field">
    <label>Notes</label>
    <input type="text" id="linkRouteNotes" placeholder="optional">
  </div>
  <div class="actions">
    <button class="btn ghost" data-close>Cancel</button>
    <button class="btn primary" id="linkRouteSave">Save</button>
  </div>
</div>

<!-- Email booking import sheet -->
<div class="sheet" id="sheetEmailImport">
  <button class="closebtn" data-close>✕</button>
  <h2>Import booking from email</h2>
  <div class="meta" id="emailImportSetupNotice" style="display:none; margin-bottom:10px;">Email import needs a one-time setup step (an AI-parsing Worker). Ask your assistant to help you set it up.</div>
  <div class="field">
    <label>Paste the confirmation email text</label>
    <textarea id="emailImportText" placeholder="Paste the full booking confirmation email here..." style="min-height:140px;"></textarea>
  </div>
  <button class="btn ghost" id="emailImportParseBtn" style="width:100%;">Parse email</button>
  <div id="emailImportPreview" style="display:none;">
    <div class="field">
      <label>Venue name</label>
      <input type="text" id="emailImportPlace" placeholder="e.g. Reflections Forster Beach">
    </div>
    <div class="field">
      <label>Check-in</label>
      <input type="date" id="emailImportCheckIn">
    </div>
    <div class="field">
      <label>Check-out</label>
      <input type="date" id="emailImportCheckOut">
    </div>
    <div class="field">
      <label>Total cost ($)</label>
      <input type="number" id="emailImportAmount" step="0.01">
    </div>
  </div>
  <div class="actions">
    <button class="btn ghost" data-close>Cancel</button>
    <button class="btn primary" id="emailImportSave" style="display:none;">Add to trip</button>
  </div>
</div>

<!-- Detail / view sheet -->
<div class="sheet" id="sheetDetail">
  <button class="closebtn" data-close>✕</button>
  <div id="detailBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- storage ---------- */
const DB_NAME='roadbook', DB_VER=4;
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('entries')) d.createObjectStore('entries',{keyPath:'id'});
      if(!d.objectStoreNames.contains('expenses')) d.createObjectStore('expenses',{keyPath:'id'});
      if(!d.objectStoreNames.contains('photos')) d.createObjectStore('photos',{keyPath:'id'});
      if(!d.objectStoreNames.contains('tombstones')) d.createObjectStore('tombstones',{keyPath:'id'});
      if(!d.objectStoreNames.contains('vehicles')) d.createObjectStore('vehicles',{keyPath:'id'});
      if(!d.objectStoreNames.contains('trips')) d.createObjectStore('trips',{keyPath:'id'});
      if(!d.objectStoreNames.contains('tracks')) d.createObjectStore('tracks',{keyPath:'id'});
      if(!d.objectStoreNames.contains('mapTiles')) d.createObjectStore('mapTiles',{keyPath:'id'});
      if(!d.objectStoreNames.contains('mapDownloads')) d.createObjectStore('mapDownloads',{keyPath:'id'});
    };
    r.onblocked=()=>{
      showDbBlockedMessage();
    };
    r.onsuccess=e=>{
      db=e.target.result;
      db.onversionchange=()=>{ db.close(); showDbBlockedMessage(); };
      res(db);
    };
    r.onerror=e=>rej(e);
  });
}
function showDbBlockedMessage(){
  const main=document.getElementById('main');
  if(!main) return;
  main.innerHTML=`<div class="empty"><span class="t">Update needs a refresh</span>Roadbook is open in another tab or window, which is blocking this update. Close any other Roadbook tabs on this device, then reload this page.<br><br><button class="btn primary" onclick="location.reload()" style="margin-top:10px;">Reload now</button></div>`;
}
function tx(store,mode='readonly'){return db.transaction(store,mode).objectStore(store);}
function idAll(store){
  return new Promise(res=>{
    const out=[]; const req=tx(store).openCursor();
    req.onsuccess=e=>{const c=e.target.result; if(c){out.push(c.value); c.continue();} else res(out);};
  });
}
function idPut(store,val){return new Promise(res=>{const r=tx(store,'readwrite').put(val); r.onsuccess=()=>res();});}
function idDelete(store,id){return new Promise(res=>{const r=tx(store,'readwrite').delete(id); r.onsuccess=()=>res();});}
function idClear(store){return new Promise(res=>{const r=tx(store,'readwrite').clear(); r.onsuccess=()=>res();});}

/* ---------- helpers ---------- */
function fmtDate(ts){
  if(!ts) return '—';
  const d=new Date(ts);
  return d.toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'2-digit'});
}
function fmtTime(ts){
  const d=new Date(ts);
  return d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}
function haversine(lat1,lon1,lat2,lon2){
  const R=6371, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toast._h); toast._h=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ---------- sketch map (offline, no tiles/keys/CDN) ---------- */
function projectLatLon(points, w, h, pad){
  let minLat=Infinity,maxLat=-Infinity,minLon=Infinity,maxLon=-Infinity;
  points.forEach(p=>{
    if(p.lat<minLat)minLat=p.lat; if(p.lat>maxLat)maxLat=p.lat;
    if(p.lon<minLon)minLon=p.lon; if(p.lon>maxLon)maxLon=p.lon;
  });
  if(minLat===maxLat){minLat-=0.05;maxLat+=0.05;}
  if(minLon===maxLon){minLon-=0.05;maxLon+=0.05;}
  const latSpan=maxLat-minLat, lonSpan=maxLon-minLon;
  return (lat,lon)=>{
    const x=pad+((lon-minLon)/lonSpan)*(w-2*pad);
    const y=pad+(1-(lat-minLat)/latSpan)*(h-2*pad);
    return [x,y];
  };
}
function buildSketchMapSvg(lineGroups, pinGroups){
  const w=320,h=190,pad=18;
  const allPts=[];
  lineGroups.forEach(g=>g.points.forEach(p=>allPts.push(p)));
  pinGroups.forEach(p=>allPts.push(p));
  if(!allPts.length) return null;
  const proj=projectLatLon(allPts,w,h,pad);
  let svg=`<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; display:block;">`;
  svg+=`<rect x="0" y="0" width="${w}" height="${h}" fill="var(--sand-dark)" rx="10"/>`;
  for(let i=1;i<4;i++){
    const gy=pad+(i*(h-2*pad)/4);
    svg+=`<line x1="${pad}" y1="${gy.toFixed(1)}" x2="${w-pad}" y2="${gy.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;
  }
  for(let i=1;i<5;i++){
    const gx=pad+(i*(w-2*pad)/5);
    svg+=`<line x1="${gx.toFixed(1)}" y1="${pad}" x2="${gx.toFixed(1)}" y2="${h-pad}" stroke="var(--line)" stroke-width="1"/>`;
  }
  lineGroups.forEach(g=>{
    if(g.points.length<2) return;
    const d=g.points.map(p=>{const xy=proj(p.lat,p.lon); return xy[0].toFixed(1)+','+xy[1].toFixed(1);}).join(' ');
    svg+=`<polyline points="${d}" fill="none" stroke="${g.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>`;
  });
  pinGroups.forEach(p=>{
    const xy=proj(p.lat,p.lon);
    svg+=`<circle cx="${xy[0].toFixed(1)}" cy="${xy[1].toFixed(1)}" r="${p.r||4}" fill="${p.color}" stroke="var(--card)" stroke-width="1.5"/>`;
  });
  svg+='</svg>';
  return svg;
}
/* ---------- live map (real OSM tiles, pan/zoom, no library) ---------- */
const LIVEMAP_MIN_ZOOM=2, LIVEMAP_MAX_ZOOM=17;
const liveMapInstances={};
function lm_lonToWorldX(lon,z){ return (lon+180)/360 * Math.pow(2,z) * 256; }
function lm_latToWorldY(lat,z){
  const rad = Math.max(Math.min(lat,85.05),-85.05)*Math.PI/180;
  return (1 - Math.log(Math.tan(rad) + 1/Math.cos(rad))/Math.PI) / 2 * Math.pow(2,z) * 256;
}
function lm_worldXToLon(x,z){ return x/(Math.pow(2,z)*256)*360-180; }
function lm_worldYToLat(y,z){
  const n = Math.PI - 2*Math.PI*y/(Math.pow(2,z)*256);
  return 180/Math.PI * Math.atan(0.5*(Math.exp(n)-Math.exp(-n)));
}
function lm_clampZoom(z){ return Math.max(LIVEMAP_MIN_ZOOM, Math.min(LIVEMAP_MAX_ZOOM, z)); }
function lm_fitView(points, width, height){
  let minLat=Infinity,maxLat=-Infinity,minLon=Infinity,maxLon=-Infinity;
  points.forEach(p=>{
    if(p.lat<minLat)minLat=p.lat; if(p.lat>maxLat)maxLat=p.lat;
    if(p.lon<minLon)minLon=p.lon; if(p.lon>maxLon)maxLon=p.lon;
  });
  const centerLat=(minLat+maxLat)/2, centerLon=(minLon+maxLon)/2;
  if(minLat===maxLat && minLon===maxLon){
    return {lat:centerLat, lon:centerLon, zoom:14};
  }
  const pad=36;
  let z=LIVEMAP_MAX_ZOOM;
  for(; z>LIVEMAP_MIN_ZOOM; z--){
    const xSpan=Math.abs(lm_lonToWorldX(maxLon,z)-lm_lonToWorldX(minLon,z));
    const ySpan=Math.abs(lm_latToWorldY(minLat,z)-lm_latToWorldY(maxLat,z));
    if(xSpan<=(width-2*pad) && ySpan<=(height-2*pad)) break;
  }
  return {lat:centerLat, lon:centerLon, zoom:z};
}
function lm_dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function lm_render(state){
  const z=Math.round(state.zoom);
  const n=Math.pow(2,z);
  const centerWX=lm_lonToWorldX(state.lon,z), centerWY=lm_latToWorldY(state.lat,z);
  const topLeftX=centerWX-state.width/2, topLeftY=centerWY-state.height/2;
  state.topLeftX=topLeftX; state.topLeftY=topLeftY; state.renderZoom=z;
  const xStart=Math.floor(topLeftX/256)-1, xEnd=Math.floor((topLeftX+state.width)/256)+1;
  const yStart=Math.floor(topLeftY/256)-1, yEnd=Math.floor((topLeftY+state.height)/256)+1;
  state.tilesEl.style.transform='';
  (state._tileUrls||[]).forEach(u=>URL.revokeObjectURL(u));
  state._tileUrls=[];
  state.tilesEl.innerHTML='';
  const renderToken=(state._renderToken=(state._renderToken||0)+1);
  for(let ty=yStart; ty<=yEnd; ty++){
    if(ty<0||ty>=n) continue;
    for(let tx=xStart; tx<=xEnd; tx++){
      const txw=((tx%n)+n)%n;
      const left=(tx*256-topLeftX).toFixed(1), top=(ty*256-topLeftY).toFixed(1);
      const img=document.createElement('img');
      img.style.cssText=`position:absolute; left:${left}px; top:${top}px; width:256px; height:256px;`;
      img.draggable=false; img.loading='lazy';
      img.src=`https://tile.openstreetmap.org/${z}/${txw}/${ty}.png`;
      state.tilesEl.appendChild(img);
      getCachedTileBlob(z,txw,ty).then(blob=>{
        if(!blob || state._renderToken!==renderToken) return;
        const url=URL.createObjectURL(blob);
        state._tileUrls.push(url);
        img.src=url;
      });
    }
  }
  lm_drawOverlay(state);
}
function lm_drawOverlay(state){
  const z=state.renderZoom;
  const toScreen=(lat,lon)=>[lm_lonToWorldX(lon,z)-state.topLeftX, lm_latToWorldY(lat,z)-state.topLeftY];
  let svg=`<svg viewBox="0 0 ${state.width} ${state.height}" width="${state.width}" height="${state.height}" style="position:absolute; top:0; left:0; pointer-events:none;">`;
  state.lineGroups.forEach(g=>{
    if(g.points.length<2) return;
    const d=g.points.map(p=>{const xy=toScreen(p.lat,p.lon); return xy[0].toFixed(1)+','+xy[1].toFixed(1);}).join(' ');
    svg+=`<polyline points="${d}" fill="none" stroke="${g.color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" style="filter:drop-shadow(0 0 2px rgba(255,255,255,0.8));"/>`;
  });
  state.pinGroups.forEach(p=>{
    const xy=toScreen(p.lat,p.lon);
    svg+=`<circle cx="${xy[0].toFixed(1)}" cy="${xy[1].toFixed(1)}" r="${p.r||4}" fill="${p.color}" stroke="#fff" stroke-width="1.5"/>`;
  });
  svg+='</svg>';
  if(state.svgEl){ state.svgEl.outerHTML=svg; } else { state.container.insertAdjacentHTML('beforeend', svg); }
  state.svgEl=state.container.querySelector('svg');
}
function lm_commitPan(state, dx, dy){
  const newCenterWX=state.topLeftX+state.width/2-dx;
  const newCenterWY=state.topLeftY+state.height/2-dy;
  state.lon=lm_worldXToLon(newCenterWX, state.renderZoom);
  state.lat=lm_worldYToLat(newCenterWY, state.renderZoom);
  lm_render(state);
}
function lm_zoomAtScreenPoint(state, screenX, screenY, delta){
  const z=state.renderZoom;
  const geoWX=state.topLeftX+screenX, geoWY=state.topLeftY+screenY;
  const lat=lm_worldYToLat(geoWY,z), lon=lm_worldXToLon(geoWX,z);
  const newZoom=lm_clampZoom(state.zoom+delta);
  if(newZoom===state.zoom) return;
  state.zoom=newZoom;
  const nz=Math.round(newZoom);
  const newGeoWX=lm_lonToWorldX(lon,nz), newGeoWY=lm_latToWorldY(lat,nz);
  state.lon=lm_worldXToLon(newGeoWX-(screenX-state.width/2), nz);
  state.lat=lm_worldYToLat(newGeoWY-(screenY-state.height/2), nz);
  lm_render(state);
}
function initLiveMap(containerId, lineGroups, pinGroups){
  const container=document.getElementById(containerId);
  if(!container) return;
  const allPts=[];
  lineGroups.forEach(g=>g.points.forEach(p=>allPts.push(p)));
  pinGroups.forEach(p=>allPts.push(p));
  if(!allPts.length){ container.innerHTML='<div class="empty" style="padding:20px;"><span class="t">Nothing to show yet</span>Locations you log will plot here.</div>'; return; }
  const rect=container.getBoundingClientRect();
  const width=rect.width||320, height=rect.height||220;
  const view=lm_fitView(allPts, width, height);
  container.innerHTML=`<div class="livemap-tiles" style="position:absolute; inset:0; overflow:hidden;"></div>
    <div class="livemap-zoom" style="position:absolute; right:8px; bottom:8px; display:flex; flex-direction:column; gap:4px; z-index:5;">
      <button type="button" data-z="in" style="width:30px; height:30px; border-radius:6px; border:1px solid var(--line); background:var(--card); font-weight:800; font-size:16px;">+</button>
      <button type="button" data-z="out" style="width:30px; height:30px; border-radius:6px; border:1px solid var(--line); background:var(--card); font-weight:800; font-size:16px;">−</button>
    </div>
    <div style="position:absolute; left:4px; bottom:2px; font-size:9px; color:var(--ink-soft); background:rgba(255,255,255,0.7); padding:1px 4px; border-radius:3px; z-index:5;">© OpenStreetMap contributors</div>`;
  container.style.position='relative';
  container.style.overflow='hidden';
  container.style.touchAction='none';
  container.style.background='#dde3e8';
  const state={
    container, tilesEl:container.querySelector('.livemap-tiles'), svgEl:null,
    width, height, lat:view.lat, lon:view.lon, zoom:view.zoom,
    lineGroups, pinGroups, pointers:new Map(), dragging:false
  };
  liveMapInstances[containerId]=state;
  lm_render(state);

  let dragOrigin=null, pinchStart=null;
  container.addEventListener('pointerdown', e=>{
    if(e.target.closest('[data-z]')) return;
    container.setPointerCapture(e.pointerId);
    state.pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(state.pointers.size===1){
      dragOrigin={x:e.clientX,y:e.clientY, topLeftX:state.topLeftX, topLeftY:state.topLeftY};
      state.dragging=true;
    } else if(state.pointers.size===2){
      const pts=[...state.pointers.values()];
      pinchStart={dist:lm_dist(pts[0],pts[1]), zoom:state.zoom, mid:{x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2}};
      state.dragging=false;
    }
  });
  container.addEventListener('pointermove', e=>{
    if(!state.pointers.has(e.pointerId)) return;
    state.pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(state.pointers.size===1 && state.dragging && dragOrigin){
      const dx=e.clientX-dragOrigin.x, dy=e.clientY-dragOrigin.y;
      state.tilesEl.style.transform=`translate(${dx}px, ${dy}px)`;
      if(state.svgEl) state.svgEl.style.transform=`translate(${dx}px, ${dy}px)`;
    } else if(state.pointers.size===2 && pinchStart){
      const pts=[...state.pointers.values()];
      const dist=lm_dist(pts[0],pts[1]);
      const ratio=dist/pinchStart.dist;
      const scale=ratio;
      const cx=pinchStart.mid.x - container.getBoundingClientRect().left;
      const cy=pinchStart.mid.y - container.getBoundingClientRect().top;
      state.tilesEl.style.transformOrigin=`${cx}px ${cy}px`;
      state.tilesEl.style.transform=`scale(${scale})`;
      if(state.svgEl){ state.svgEl.style.transformOrigin=`${cx}px ${cy}px`; state.svgEl.style.transform=`scale(${scale})`; }
      state._pinchRatio=ratio;
    }
  });
  function endInteraction(e){
    if(state.pointers.has(e.pointerId)) state.pointers.delete(e.pointerId);
    if(state.dragging && dragOrigin && state.pointers.size===0){
      const dx=e.clientX-dragOrigin.x, dy=e.clientY-dragOrigin.y;
      state.dragging=false; dragOrigin=null;
      lm_commitPan(state, dx, dy);
    } else if(pinchStart && state.pointers.size<2){
      const ratio=state._pinchRatio||1;
      const deltaZoom=Math.log2(ratio);
      const cx=pinchStart.mid.x - container.getBoundingClientRect().left;
      const cy=pinchStart.mid.y - container.getBoundingClientRect().top;
      state.tilesEl.style.transform=''; state.tilesEl.style.transformOrigin='';
      if(state.svgEl){ state.svgEl.style.transform=''; state.svgEl.style.transformOrigin=''; }
      pinchStart=null; state._pinchRatio=1;
      lm_zoomAtScreenPoint(state, cx, cy, Math.round(deltaZoom));
    }
  }
  container.addEventListener('pointerup', endInteraction);
  container.addEventListener('pointercancel', endInteraction);
  container.addEventListener('wheel', e=>{
    e.preventDefault();
    const rect2=container.getBoundingClientRect();
    lm_zoomAtScreenPoint(state, e.clientX-rect2.left, e.clientY-rect2.top, e.deltaY<0?1:-1);
  }, {passive:false});
  container.addEventListener('dblclick', e=>{
    const rect2=container.getBoundingClientRect();
    lm_zoomAtScreenPoint(state, e.clientX-rect2.left, e.clientY-rect2.top, 1);
  });
  container.querySelectorAll('[data-z]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      lm_zoomAtScreenPoint(state, state.width/2, state.height/2, btn.dataset.z==='in'?1:-1);
    });
  });
}

function tripColor(idx){
  const palette=['var(--terracotta)','var(--eucalypt)','var(--rust)','var(--ochre)','var(--plum)'];
  return palette[idx % palette.length];
}
function entriesForTripRange(t){
  if(!t.startDate) return [];
  const startTs=new Date(t.startDate+'T00:00:00').getTime();
  const endTs=t.endDate ? new Date(t.endDate+'T23:59:59').getTime() : Date.now();
  return entries.filter(e=>e.ts>=startTs && e.ts<=endTs);
}
function tripMapGroups(t, color){
  const tTracks=tracks.filter(tr=>tr.tripId===t.id);
  const tEntries=entriesForTripRange(t);
  const lineGroups=tTracks.filter(tr=>tr.points&&tr.points.length>1).map(tr=>({points:tr.points, color}));
  const pinGroups=[];
  tTracks.filter(tr=>tr.linkLat!=null).forEach(tr=>pinGroups.push({lat:tr.linkLat, lon:tr.linkLon, color, r:5}));
  tTracks.forEach(tr=>(tr.stepPins||[]).forEach(s=>pinGroups.push({lat:s.lat, lon:s.lon, color, r:2.5})));
  tEntries.filter(e=>e.lat!=null).forEach(e=>pinGroups.push({lat:e.lat, lon:e.lon, color, r:3.5}));
  return {lineGroups, pinGroups, tTracks, tEntries};
}
function renderTripMapWidget(t){
  const {lineGroups,pinGroups}=tripMapGroups(t, 'var(--terracotta)');
  const allPts=[]; lineGroups.forEach(g=>g.points.forEach(p=>allPts.push(p))); pinGroups.forEach(p=>allPts.push(p));
  if(!allPts.length) return '';
  const mapId='livemap-trip-'+t.id;
  return `<div class="sectitle" style="margin-top:14px;">Where you've been</div>
    <div id="${mapId}" class="mapwidget" style="border:1px solid var(--line); border-radius:var(--radius-sm); overflow:hidden; height:240px; position:relative;"></div>`;
}
function mountTripMapWidget(t){
  const mapId='livemap-trip-'+t.id;
  if(!document.getElementById(mapId)) return;
  const {lineGroups,pinGroups}=tripMapGroups(t, 'var(--terracotta)');
  initLiveMap(mapId, lineGroups, pinGroups);
}
/* ---------- offline map downloads (cached OSM tiles per trip) ---------- */
const OFFLINE_ZMIN=9, OFFLINE_ZMAX=16;
function tileKey(z,x,y){ return z+'_'+x+'_'+y; }
function offlineBufferForZoom(z){
  if(z<=10) return 1;
  if(z<=15) return 2;
  return 1;
}
function computeCorridorTiles(lineGroups, pinGroups, zMin, zMax){
  const tileSet=new Set();
  const list=[];
  function addTile(z,x,y,buf){
    const n=Math.pow(2,z);
    for(let dx=-buf; dx<=buf; dx++){
      for(let dy=-buf; dy<=buf; dy++){
        const xx=((x+dx)%n+n)%n, yy=y+dy;
        if(yy<0||yy>=n) continue;
        const key=tileKey(z,xx,yy);
        if(!tileSet.has(key)){ tileSet.add(key); list.push({z,x:xx,y:yy}); }
      }
    }
  }
  for(let z=zMin; z<=zMax; z++){
    const buf=offlineBufferForZoom(z);
    const tk=40075/Math.pow(2,z);
    lineGroups.forEach(g=>{
      const pts=g.points;
      if(pts.length===1){
        const x=Math.floor(lm_lonToWorldX(pts[0].lon,z)/256), y=Math.floor(lm_latToWorldY(pts[0].lat,z)/256);
        addTile(z,x,y,buf);
        return;
      }
      for(let i=0;i<pts.length-1;i++){
        const p1=pts[i], p2=pts[i+1];
        const distKm=haversine(p1.lat,p1.lon,p2.lat,p2.lon);
        const steps=Math.max(1, Math.ceil(distKm/(tk*0.8)));
        for(let s=0; s<=steps; s++){
          const f=s/steps;
          const lat=p1.lat+(p2.lat-p1.lat)*f, lon=p1.lon+(p2.lon-p1.lon)*f;
          const x=Math.floor(lm_lonToWorldX(lon,z)/256), y=Math.floor(lm_latToWorldY(lat,z)/256);
          addTile(z,x,y,buf);
        }
      }
    });
    pinGroups.forEach(p=>{
      const x=Math.floor(lm_lonToWorldX(p.lon,z)/256), y=Math.floor(lm_latToWorldY(p.lat,z)/256);
      addTile(z,x,y,buf);
    });
  }
  return list;
}
function tripOfflineTileList(t){
  const {lineGroups,pinGroups}=tripMapGroups(t, 'x');
  return computeCorridorTiles(lineGroups, pinGroups, OFFLINE_ZMIN, OFFLINE_ZMAX);
}
async function getMapDownloadForTrip(tripId){
  const all=await idAll('mapDownloads');
  return all.find(d=>d.tripId===tripId) || null;
}
async function getCachedTileBlob(z,x,y){
  return new Promise(res=>{
    const r=tx('mapTiles').get(tileKey(z,x,y));
    r.onsuccess=()=>res(r.result ? r.result.blob : null);
    r.onerror=()=>res(null);
  });
}
async function downloadOfflineMapForTrip(t, onProgress){
  const tiles=tripOfflineTileList(t);
  const total=tiles.length;
  let done=0, bytes=0, failed=0;
  const CONCURRENCY=4;
  let idx=0;
  async function worker(){
    while(idx<tiles.length){
      const my=tiles[idx++];
      const key=tileKey(my.z,my.x,my.y);
      try{
        const existing=await getCachedTileBlob(my.z,my.x,my.y);
        if(existing){
          bytes+=existing.size;
        } else {
          const resp=await fetch(`https://tile.openstreetmap.org/${my.z}/${my.x}/${my.y}.png`);
          if(resp.ok){
            const blob=await resp.blob();
            await idPut('mapTiles', {id:key, z:my.z, x:my.x, y:my.y, blob, sizeBytes:blob.size, savedAt:Date.now()});
            bytes+=blob.size;
          } else {
            failed++;
          }
        }
      } catch(err){ failed++; }
      done++;
      if(onProgress) onProgress({done, total, bytes, failed});
    }
  }
  await Promise.all(Array.from({length:Math.min(CONCURRENCY,tiles.length)}, worker));
  const record={
    id: newId(),
    tripId: t.id,
    tripName: t.name,
    zMin: OFFLINE_ZMIN, zMax: OFFLINE_ZMAX,
    tileKeys: tiles.map(tl=>tileKey(tl.z,tl.x,tl.y)),
    tileCount: total,
    sizeBytes: bytes,
    createdAt: Date.now()
  };
  await idPut('mapDownloads', record);
  return record;
}
async function deleteOfflineMap(downloadId){
  const all=await idAll('mapDownloads');
  const rec=all.find(d=>d.id===downloadId);
  if(!rec) return;
  const others=all.filter(d=>d.id!==downloadId);
  const stillNeeded=new Set();
  others.forEach(o=>(o.tileKeys||[]).forEach(k=>stillNeeded.add(k)));
  for(const k of (rec.tileKeys||[])){
    if(!stillNeeded.has(k)) await idDelete('mapTiles', k);
  }
  await idDelete('mapDownloads', downloadId);
}
function fmtBytes(b){
  if(b==null) return '';
  if(b<1024*1024) return (b/1024).toFixed(0)+' KB';
  return (b/(1024*1024)).toFixed(0)+' MB';
}

async function mountOfflineMapSection(t){
  const el=document.getElementById('offlineMapSection-'+t.id);
  if(!el) return;
  const existing=await getMapDownloadForTrip(t.id);
  if(existing){
    el.innerHTML=`<div class="meta">Downloaded for offline use · ${fmtBytes(existing.sizeBytes)} (${existing.tileCount} tiles)</div>
      <button class="btn ghost" id="deleteOfflineMapBtn" style="width:100%; margin-top:6px;">Delete offline map</button>`;
    document.getElementById('deleteOfflineMapBtn').onclick=async()=>{
      if(!confirm('Delete the downloaded offline map for this trip? You can download it again anytime you have signal.')) return;
      await deleteOfflineMap(existing.id);
      toast('Offline map deleted');
      mountOfflineMapSection(t);
    };
    return;
  }
  const tileList=tripOfflineTileList(t);
  if(!tileList.length){
    el.innerHTML=`<div class="meta">Add stops or a recorded route to this trip to enable an offline download.</div>`;
    return;
  }
  const estMB=Math.max(1, Math.round(tileList.length*15/1024));
  el.innerHTML=`<div class="meta">~${estMB} MB · ${tileList.length} map tiles · needs a connection to download, then works offline</div>
    <button class="btn primary" id="downloadOfflineMapBtn" style="width:100%; margin-top:6px;">Download offline map</button>`;
  document.getElementById('downloadOfflineMapBtn').onclick=async()=>{
    const btn=document.getElementById('downloadOfflineMapBtn');
    btn.disabled=true;
    try{
      await downloadOfflineMapForTrip(t, (p)=>{
        const pct=Math.round(100*p.done/p.total);
        btn.textContent=`Downloading… ${pct}% (${p.done}/${p.total})`;
      });
      toast('Offline map downloaded');
    }catch(err){
      toast('Download failed — check your connection and try again');
    }
    mountOfflineMapSection(t);
  };
}

let _travelMapGroups=null;
function renderTravelMap(){
  const sortedTrips=trips.slice().sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||''));
  const lineGroups=[], pinGroups=[], legend=[];
  const usedTrackIds=new Set(), usedEntryIds=new Set();
  sortedTrips.forEach((t,i)=>{
    const color=tripColor(i);
    const {lineGroups:lg, pinGroups:pg, tTracks, tEntries}=tripMapGroups(t, color);
    tTracks.forEach(tr=>usedTrackIds.add(tr.id));
    tEntries.forEach(e=>usedEntryIds.add(e.id));
    lineGroups.push(...lg); pinGroups.push(...pg);
    if(tTracks.length||tEntries.length) legend.push({name:t.name,color});
  });
  const neutral='var(--ink-soft)';
  const unassignedTracks=tracks.filter(tr=>!usedTrackIds.has(tr.id));
  const unassignedEntries=entries.filter(e=>!usedEntryIds.has(e.id));
  unassignedTracks.filter(tr=>tr.points&&tr.points.length>1).forEach(tr=>lineGroups.push({points:tr.points,color:neutral}));
  unassignedTracks.filter(tr=>tr.linkLat!=null).forEach(tr=>pinGroups.push({lat:tr.linkLat,lon:tr.linkLon,color:neutral,r:5}));
  unassignedEntries.filter(e=>e.lat!=null).forEach(e=>pinGroups.push({lat:e.lat,lon:e.lon,color:neutral,r:3.5}));
  if(unassignedTracks.length||unassignedEntries.length) legend.push({name:'Unassigned',color:neutral});

  const allPts=[]; lineGroups.forEach(g=>g.points.forEach(p=>allPts.push(p))); pinGroups.forEach(p=>allPts.push(p));
  if(!allPts.length){ _travelMapGroups=null; return '<div class="empty"><span class="t">Nothing logged yet</span>Locations you log will plot here once you add stops or record a route.</div>'; }
  _travelMapGroups={lineGroups, pinGroups};
  const legendHtml = legend.length ? `<div class="maplegend" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;">${legend.map(l=>`<div style="display:flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-soft);"><span style="width:9px;height:9px;border-radius:50%;background:${l.color};display:inline-block;"></span>${escapeHtml(l.name)}</div>`).join('')}</div>` : '';
  return `<div id="livemap-travel" class="mapwidget" style="border:1px solid var(--line); border-radius:var(--radius-sm); overflow:hidden; height:400px; position:relative;"></div>${legendHtml}`;
}

function travelTrackRow(t){
  return `<div class="row" data-open-track="${t.id}">

      <div class="meta">${t.distanceKm!=null ? t.distanceKm.toFixed(1)+' km · '+Math.max(1,Math.round((t.endTs-t.startTs)/60000))+' min' : (t.externalLink?'Linked route':'')}</div>
    </div>
  </div>`;
}
function renderTravelTimeline(){
  const items = [
    ...entries.map(e=>({ts:e.ts, html:travelEntryRow(e)})),
    ...tracks.map(t=>({ts:t.startTs, html:travelTrackRow(t)}))
  ].sort((a,b)=>b.ts-a.ts);
  if(!items.length) return '<div class="empty"><span class="t">Nothing logged yet</span>Stops and routes you add will show up here.</div>';
  return items.map(i=>i.html).join('');
}
function renderTravelByTrip(){
  const sortedTrips = trips.slice().sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||''));
  const usedTrackIds = new Set();
  const usedEntryIds = new Set();
  let html = '';
  sortedTrips.forEach(t=>{
    const tTracks = tracks.filter(tr=>tr.tripId===t.id);
    tTracks.forEach(tr=>usedTrackIds.add(tr.id));
    const tEntries = entriesForTripRange(t);
    tEntries.forEach(e=>usedEntryIds.add(e.id));
    html += `<div class="sectitle" style="margin-top:14px; cursor:pointer;" data-open-trip-travel="${t.id}">${escapeHtml(t.name)} <span class="badge ${t.status}" style="margin-left:6px;">${t.status}</span></div>`;
    if(!tTracks.length && !tEntries.length){
      html += '<div class="meta" style="margin-bottom:8px;">Nothing logged for this trip yet</div>';
    } else {
      html += tTracks.map(travelTrackRow).join('') + tEntries.map(travelEntryRow).join('');
    }
  });
  const unassignedTracks = tracks.filter(tr=>!usedTrackIds.has(tr.id));
  const unassignedEntries = entries.filter(e=>!usedEntryIds.has(e.id));
  if(unassignedTracks.length || unassignedEntries.length){
    html += `<div class="sectitle" style="margin-top:14px;">Unassigned</div>`;
    html += unassignedTracks.map(travelTrackRow).join('') + unassignedEntries.map(travelEntryRow).join('');
  }
  if(!html) html = '<div class="empty"><span class="t">Nothing logged yet</span>Plan a trip and start logging to see it here.</div>';
  return html;
}

function buildMapsLink(stops){
  const pts=(stops||[]).filter(s=>s.lat!=null || (s.name&&s.name.trim()));
  if(!pts.length) return null;
  const toParam=s=> s.lat!=null ? `${s.lat},${s.lon}` : encodeURIComponent(s.name);
  if(pts.length===1) return `https://www.google.com/maps/dir/?api=1&destination=${toParam(pts[0])}&travelmode=driving`;
  const destination=toParam(pts[pts.length-1]);
  const waypoints=pts.slice(0,-1).map(toParam).join('|');
  return `https://www.google.com/maps/dir/?api=1&destination=${destination}&waypoints=${waypoints}&travelmode=driving`;
}

    <div class="actions">

  const el=document.getElementById('tripStopList');

  el.innerHTML = pendingTripStops.map((s,i)=>`<div class="stoplistitem">

/* ---------- link parsing / previews ---------- */
const LINK_PREVIEW_WORKER_URL = '';
const POLARSTEPS_WORKER_URL = 'https://roadbook-polarsteps.azzacalvin.workers.dev';
const EMAIL_IMPORT_WORKER_URL = 'https://roadbook-email-import-workerjs.azzacalvin.workers.dev';
const RECEIPT_SCAN_WORKER_URL = EMAIL_IMPORT_WORKER_URL; // same free Worker, different request shape
function parsePolarstepsUrl(url){
  if(!url) return null;
  try{
    const u=new URL(url);
    if(!/(^|\.)polarsteps\.com$/i.test(u.hostname)) return null;
    const parts=u.pathname.replace(/^\/|\/$/g,'').split('/');
    if(parts.length<2) return null;
    const tripPart=parts[1];
    const dash=tripPart.indexOf('-');
    const tripId=dash>-1 ? tripPart.slice(0,dash) : tripPart;
    if(!/^\d+$/.test(tripId)) return null;
    const secret=u.searchParams.get('s')||'';
    return {tripId, secret};
  }catch(e){ return null; }
}
async function fetchPolarstepsTrack(tripId, secret){
  if(!POLARSTEPS_WORKER_URL || !tripId) return null;
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(), 12000);
    const qs='tripId='+encodeURIComponent(tripId)+(secret?'&secret='+encodeURIComponent(secret):'');
    const res=await fetch(`${POLARSTEPS_WORKER_URL}?${qs}`, {signal: controller.signal});
    clearTimeout(timeout);
    if(!res.ok) return null;
    const data=await res.json();
    if(data.error) return null;
    return data;
  }catch(err){
    return null;
  }
}
function trackDistanceKm(points){
  if(!points || points.length<2) return null;
  let d=0;
  for(let i=1;i<points.length;i++) d+=haversine(points[i-1].lat,points[i-1].lon,points[i].lat,points[i].lon);
  return d;
}
function parseGoogleMapsCoords(url){
  if(!url) return null;
  let m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]), lon:parseFloat(m[2])};
  m = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]), lon:parseFloat(m[2])};
  m = url.match(/destination=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]), lon:parseFloat(m[2])};
  m = url.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]), lon:parseFloat(m[2])};
  return null;
}
async function fetchLinkPreview(url){
  if(!LINK_PREVIEW_WORKER_URL || !url) return null;
  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 6000);
    const res = await fetch(`${LINK_PREVIEW_WORKER_URL}?url=${encodeURIComponent(url)}`, {signal: controller.signal});
    clearTimeout(timeout);
    if(!res.ok) return null;
    const data = await res.json();
    if(data.error) return null;
    return data;
  }catch(err){
    return null;
  }
}
function openTrackDetail(id){

    ${trackMapId ? `<div id="${trackMapId}" class="mapwidget" style="border:1px solid var(--line); border-radius:var(--radius-sm); overflow:hidden; margin-top:8px; height:220px; position:relative;"></div>` : (t.linkLat!=null ? `<iframe src="https://www.google.com/maps?q=${t.linkLat},${t.linkLon}&z=12&output=embed" style="width:100%; height:160px; border:0; border-radius:12px; margin-top:8px;" loading="lazy"></iframe>` : (t.linkPreviewImage ? `
    <div class="card" style="padding:0; overflow:hidden; margin-top:8px; margin-bottom:0;"><img src="${t.linkPreviewImage}" style="width:100%; max-height:180px; object-fit:cover; display:block;"></div>
    ${t.linkPreviewTitle?`<div class="meta" style="margin-top:6px; font-weight:700; color:var(--ink); font-size:13px;">${escapeHtml(t.linkPreviewTitle)}</div>`:''}
    ${t.linkPreviewDescription?`<div class="meta" style="margin-top:2px;">${escapeHtml(t.linkPreviewDescription)}</div>`:''}
    ` : ''))}
    ${canFetchPolarsteps?`<button class="btn primary" id="fetchPolarstepsBtn" style="width:100%; margin-top:6px;">Fetch GPS track from Polarsteps</button>`:''}
    ${mapsLink?`<button class="btn primary" id="openTrackMapsBtn" style="width:100%; margin-top:6px;">Open route in Google Maps</button>`:''}
    ${t.externalLink?`<button class="btn primary" id="openTrackLinkBtn" style="width:100%; margin-top:6px;">Open linked route</button>`:''}
    <div class="field" style="margin-top:12px;">
      <label>Linked trip</label>

      <button class="btn ghost" data-close>Close</button>
      <button class="btn danger" id="delTrack">Delete</button>

  if(trackMapId){
    initLiveMap(trackMapId, [{points:t.points, color:'var(--terracotta)'}], (t.stepPins||[]).map(s=>({lat:s.lat, lon:s.lon, color:'var(--terracotta-dark)', r:3})));
  }
  if(mapsLink) document.getElementById('openTrackMapsBtn').onclick=()=>window.open(mapsLink,'_blank');
  if(t.externalLink) document.getElementById('openTrackLinkBtn').onclick=()=>window.open(t.externalLink,'_blank');
  if(canFetchPolarsteps){
    document.getElementById('fetchPolarstepsBtn').onclick=async()=>{
      const btn=document.getElementById('fetchPolarstepsBtn');
      btn.textContent='Fetching…'; btn.disabled=true;
      const result=await fetchPolarstepsTrack(ps.tripId, ps.secret);
      if(!result || !result.track || result.track.length<2){
        toast('Could not fetch GPS data — check the trip is shared/public');
        btn.textContent='Fetch GPS track from Polarsteps'; btn.disabled=false;
        return;
      }
      t.points=result.track;
      t.distanceKm=trackDistanceKm(result.track);
      t.stepPins=result.steps||null;
      t.startTs=result.track[0].ts ? new Date(result.track[0].ts).getTime() : t.startTs;
      t.endTs=result.track[result.track.length-1].ts ? new Date(result.track[result.track.length-1].ts).getTime() : t.endTs;
      t.updatedAt=Date.now();
      await idPut('tracks', t);
      await loadAll(); toast('GPS track imported'); scheduleSync();
      openTrackDetail(id);
    };
  }
  document.getElementById('trackTripSelect').onchange=async(e)=>{
    t.tripId = e.target.value || null;
    t.updatedAt=Date.now();
    await idPut('tracks', t);
    await loadAll(); toast(t.tripId?'Linked to trip':'Unlinked'); scheduleSync();
    openTrackDetail(id);
  };
  document.getElementById('delTrack').onclick=async()=>{
    await idDelete('tracks', id);
    await idPut('tombstones',{id, store:'tracks', deletedAt:Date.now()});
    await loadAll(); closeSheets(); render(); toast('Route deleted'); scheduleSync();
  };
  openSheet('sheetDetail');
}
function buildTrackMapsLink(points){
  if(!points || points.length<2) return null;
  const maxWaypoints=8;
  let sampled=points;
  if(points.length>maxWaypoints+2){
    const step=Math.ceil(points.length/(maxWaypoints+2));
    sampled=[]; for(let i=0;i<points.length;i+=step) sampled.push(points[i]);
    if(sampled[sampled.length-1]!==points[points.length-1]) sampled.push(points[points.length-1]);
  }
  const toParam=p=>`${p.lat},${p.lon}`;
  const destination=toParam(sampled[sampled.length-1]);
  const waypoints=sampled.slice(0,-1).map(toParam).join('|');
  return `https://www.google.com/maps/dir/?api=1&destination=${destination}&waypoints=${waypoints}&travelmode=driving`;
}

  if(!tags) return null;
  const radius=300;
  const clauses=tags.map(([k,v])=>`node(around:${radius},${lat},${lon})["${k}"="${v}"];way(around:${radius},${lat},${lon})["${k}"="${v}"];`).join('');
  const q=`[out:json][timeout:12];(${clauses});out center 10;`;
  try{
    const resp=await withTimeout(fetch('https://overpass-api.de/api/interpreter',{method:'POST', body:q}), 9000);
    if(!resp.ok) return null;
    const data=await resp.json();
    const named=(data.elements||[]).filter(e=>e.tags && e.tags.name);
    if(!named.length) return null;
    let best=null, bestDist=Infinity;
    named.forEach(e=>{
      const elat=e.lat!=null?e.lat:(e.center?e.center.lat:null);
      const elon=e.lon!=null?e.lon:(e.center?e.center.lon:null);
      if(elat==null) return;
      const d=haversine(lat,lon,elat,elon);
      if(d<bestDist){ bestDist=d; best=e; }
    });
    return best ? best.tags.name : null;
  }catch(err){ return null; }
}
function captureGeo(which){
  const btn=document.getElementById(which+'GeoBtn');
  const readout=document.getElementById(which+'GeoReadout');
  if(!navigator.geolocation){ readout.textContent='Location not available on this device.'; return; }
  btn.textContent='📍 Locating…';
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude, lon=pos.coords.longitude;
    pendingGeo[which]={lat, lon};
    btn.textContent='📍 Location captured';
    btn.classList.add('got');
    readout.textContent=lat.toFixed(5)+', '+lon.toFixed(5)+' (±'+Math.round(pos.coords.accuracy)+'m)';
    if(which==='spend'){
      const catBtn=document.querySelector('#catGrid button.selected');
      const category=catBtn?catBtn.dataset.cat:null;
      if(NEARBY_PLACE_TAGS[category]){
        readout.textContent='Looking up nearby place…';
        const place=await lookupNearbyPlace(lat,lon,category);
        if(pendingGeo.spend && pendingGeo.spend.lat===lat && pendingGeo.spend.lon===lon){
          if(place){
            pendingGeo.spend.place=place;
            readout.innerHTML=`<strong>${escapeHtml(place)}</strong><br>${lat.toFixed(5)}, ${lon.toFixed(5)}`;
          } else {
            readout.textContent=lat.toFixed(5)+', '+lon.toFixed(5)+' (±'+Math.round(pos.coords.accuracy)+'m)';
          }
        }
      }
    }
  },err=>{
    btn.textContent='📍 Capture current location';
    readout.textContent='Could not get location — check permission, try again.';
  },{enableHighAccuracy:true, timeout:15000});
}

function resizeImage(file){
  return new Promise(resolve=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=e=>{ img.onload=()=>{
      const maxW=1280;
      const scale=Math.min(1, maxW/img.width);
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.72));
    }; img.src=e.target.result; };
    reader.readAsDataURL(file);
  });
}

/* ---------- trip recorder (start/stop GPS route) ---------- */
let recording=false, recordWatchId=null, recordPoints=[], recordStartTs=null, recordTimerInterval=null;
function startRecording(){
  if(!navigator.geolocation){ toast('Location not available on this device.'); return; }
  recording=true; recordPoints=[]; recordStartTs=Date.now();
  recordWatchId=navigator.geolocation.watchPosition(pos=>{
    recordPoints.push({lat:pos.coords.latitude, lon:pos.coords.longitude, ts:Date.now()});
    updateRecordingReadout();
  }, err=>{ toast('Location error — check permission'); }, {enableHighAccuracy:true, maximumAge:5000, timeout:20000});
  recordTimerInterval=setInterval(updateRecordingReadout,1000);
  if(activeTab==='log'||activeTab==='home') render();
  toast('Recording started — keep the app open while driving');
}
async function stopRecording(){
  if(recordWatchId!=null) navigator.geolocation.clearWatch(recordWatchId);
  clearInterval(recordTimerInterval);
  recording=false;
  const pts=recordPoints; recordPoints=[];
  if(pts.length<2){ toast('Not enough GPS points captured'); if(activeTab==='log'||activeTab==='home') render(); return; }
  let dist=0; for(let i=1;i<pts.length;i++) dist+=haversine(pts[i-1].lat,pts[i-1].lon,pts[i].lat,pts[i].lon);
  const name=prompt('Name this route (optional):','') || ('Route '+fmtDate(recordStartTs));
  const track={id:newId(), name, startTs:recordStartTs, endTs:Date.now(), points:pts, distanceKm:dist, tripId:null, updatedAt:Date.now()};
  await idPut('tracks', track);
  await loadAll();
  if(activeTab==='log'||activeTab==='home') render();
  toast('Route saved'); scheduleSync();
}
function updateRecordingReadout(){
  const el=document.getElementById('recordReadout');
  if(!el) return;
  const secs=Math.floor((Date.now()-recordStartTs)/1000);
  const mins=Math.floor(secs/60), s=secs%60;
  let dist=0; for(let i=1;i<recordPoints.length;i++) dist+=haversine(recordPoints[i-1].lat,recordPoints[i-1].lon,recordPoints[i].lat,recordPoints[i].lon);
  el.textContent = mins+':'+String(s).padStart(2,'0')+' · '+dist.toFixed(1)+' km';
}

/* ---------- export / import ---------- */
function download(filename, content, type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
async function shareOrDownload(filename, content, type){
  try{
    const file=new File([content], filename, {type});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:filename});
      toast('Choose Drive from the share sheet to save it there');
      return;
    }
  }catch(err){
    if(err && err.name==='AbortError') return;
  }
  download(filename, content, type);
  toast('Saved to Downloads — open the Drive app to upload it');
}
function exportJson(){
  const payload={version:2, exportedAt:new Date().toISOString(), entries, expenses, photos, vehicles, trips, tracks};
  shareOrDownload('roadbook-backup-'+new Date().toISOString().slice(0,10)+'.json', JSON.stringify(payload), 'application/json');
}
function exportCsv(){
  const rows=[['Date','Category','Amount','Odometer(km)','Note','Lat','Lon']];
  expenses.slice().sort((a,b)=>a.ts-b.ts).forEach(e=>{
    rows.push([fmtDate(e.ts), e.category, parseFloat(e.amount).toFixed(2), e.odo||'', (e.note||'').replace(/,/g,';'), e.lat||'', e.lon||'']);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  shareOrDownload('roadbook-expenses-'+new Date().toISOString().slice(0,10)+'.csv', csv, 'text/csv');
}
function importJson(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!confirm('This replaces all data currently on this device with the backup file. Continue?')) return;
      await idClear('entries'); await idClear('expenses'); await idClear('photos');
      await idClear('vehicles'); await idClear('trips'); await idClear('tracks');
      for(const x of data.entries||[]) await idPut('entries',x);
      for(const x of data.expenses||[]) await idPut('expenses',x);
      for(const x of data.photos||[]) await idPut('photos',x);
      for(const x of data.vehicles||[]) await idPut('vehicles',x);
      for(const x of data.trips||[]) await idPut('trips',x);
      for(const x of data.tracks||[]) await idPut('tracks',x);
      await loadAll(); render(); toast('Backup restored');
    }catch(err){ toast('Could not read that file'); }
  };
  reader.readAsText(file);
  e.target.value='';
}
async function wipeAll(){
  if(!confirm('Erase all data from this device? This cannot be undone. Your Drive sync copy (if connected) is not touched.')) return;
  await idClear('entries'); await idClear('expenses'); await idClear('photos'); await idClear('tombstones');
  await idClear('vehicles'); await idClear('trips'); await idClear('tracks');
  await loadAll(); render(); toast('All data erased');
}

/* ---------- Google Drive sync ---------- */
const GOOGLE_CLIENT_ID='230651067833-9nm4ek3r5n6hgqjrfm3ff8ebmhpg5ue2.apps.googleusercontent.com';
const DRIVE_SCOPE='https://www.googleapis.com/auth/drive.file';
const SYNC_FILENAME='roadbook-sync.json';
const DRIVE_FILES='https://www.googleapis.com/drive/v3/files';
const DRIVE_UPLOAD='https://www.googleapis.com/upload/drive/v3/files';

let tokenClient=null, accessToken=null;
let syncFileId=localStorage.getItem('rb_syncFileId')||null;
let googleConnected=localStorage.getItem('rb_googleConnected')==='1';
let lastSyncAt=localStorage.getItem('rb_lastSyncAt')||null;
let syncInFlight=false, syncQueued=false, syncDebounceTimer=null;

function waitForGis(timeoutMs=6000){
  return new Promise(resolve=>{
    const start=Date.now();
    (function poll(){
      if(window.google && google.accounts && google.accounts.oauth2){ resolve(true); return; }
      if(Date.now()-start>timeoutMs){ resolve(false); return; }
      setTimeout(poll,150);
    })();
  });
}
function initGis(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,
    scope:DRIVE_SCOPE,
    callback:''
  });
}
async function ensureTokenClient(){
  if(tokenClient) return true;
  const ready=await waitForGis(8000);
  if(ready && !tokenClient) initGis();
  return !!tokenClient;
}
function requestToken(interactive){
  return new Promise(async(resolve,reject)=>{
    const ok=await ensureTokenClient();
    if(!ok || !tokenClient){ reject(new Error('unavailable')); return; }
    let settled=false;
    const to=setTimeout(()=>{ if(!settled){settled=true; reject(new Error('timeout'));} }, interactive?60000:6000);
    tokenClient.callback=(resp)=>{
      if(settled) return; settled=true; clearTimeout(to);
      if(resp && resp.error){ reject(resp); return; }
      accessToken=resp.access_token;
      resolve(accessToken);
    };
    try{
      tokenClient.requestAccessToken({prompt: interactive?'consent':''});
    }catch(err){ if(!settled){settled=true; clearTimeout(to); reject(err);} }
  });
}
function setSyncStatus(msg){
  const el=document.getElementById('syncStatus');
  if(el) el.textContent=msg;
}

async function findSyncFile(){
  if(syncFileId) return syncFileId;
  const q=encodeURIComponent("name='"+SYNC_FILENAME+"' and trashed=false");
  const res=await fetch(`${DRIVE_FILES}?q=${q}&spaces=drive&fields=files(id,modifiedTime)`,{
    headers:{Authorization:'Bearer '+accessToken}
  });
  if(!res.ok) throw new Error('drive list failed: '+res.status);
  const data=await res.json();
  if(data.files && data.files.length){
    syncFileId=data.files[0].id;
    localStorage.setItem('rb_syncFileId', syncFileId);
    return syncFileId;
  }
  return null;
}
async function downloadRemote(fileId){
  if(!fileId) return null;
  const res=await fetch(`${DRIVE_FILES}/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+accessToken}});
  if(res.status===404) return null;
  if(!res.ok) throw new Error('drive download failed: '+res.status);
  const text=await res.text();
  if(!text) return null;
  try{ return JSON.parse(text); }catch(e){ return null; }
}
async function uploadRemote(fileId, payload){
  const body=JSON.stringify(payload);
  if(fileId){
    const res=await fetch(`${DRIVE_UPLOAD}/${fileId}?uploadType=media`,{
      method:'PATCH',
      headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},
      body
    });
    if(!res.ok) throw new Error('drive update failed: '+res.status);
    return fileId;
  }
  const boundary='rbsync'+Date.now();
  const metadata=JSON.stringify({name:SYNC_FILENAME});
  const multipartBody=
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${metadata}\r\n`+
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n`+
    `--${boundary}--`;
  const res=await fetch(`${DRIVE_UPLOAD}?uploadType=multipart`,{
    method:'POST',
    headers:{Authorization:'Bearer '+accessToken,'Content-Type':`multipart/related; boundary=${boundary}`},
    body:multipartBody
  });
  if(!res.ok) throw new Error('drive create failed: '+res.status);
  const data=await res.json();
  syncFileId=data.id;
  localStorage.setItem('rb_syncFileId', syncFileId);
  return syncFileId;
}

function unionById(localArr, remoteArr){
  const map=new Map();
  for(const x of localArr) map.set(x.id,x);
  for(const x of remoteArr) if(!map.has(x.id)) map.set(x.id,x);
  return [...map.values()];
}
function applyTombstones(arr, tsIds){
  return arr.filter(x=>!tsIds.has(x.id));
}
function mergeVehicles(localArr, remoteArr){
  const map=new Map();
  for(const x of localArr) map.set(x.id,x);
  for(const x of remoteArr){
    const cur=map.get(x.id);
    if(!cur || (x.updatedAt||0) > (cur.updatedAt||0)) map.set(x.id,x);
  }
  return [...map.values()];
}

async function syncNow(interactive){
  if(!googleConnected && !interactive) return;
  if(syncInFlight){ syncQueued=true; return; }
  syncInFlight=true;
  setSyncStatus('Syncing…');
  try{
    if(!accessToken){
      await requestToken(interactive);
    }
    let fileId;
    try{
      fileId=await findSyncFile();
    }catch(err){
      accessToken=null;
      await requestToken(interactive);
      fileId=await findSyncFile();
    }
    const remote=await downloadRemote(fileId);
    const remoteEntries=remote?.entries||[], remoteExpenses=remote?.expenses||[], remotePhotos=remote?.photos||[], remoteTombstones=remote?.tombstones||[];
    const remoteVehicles=remote?.vehicles||[], remoteTrips=remote?.trips||[], remoteTracks=remote?.tracks||[];

    const mergedTombstones=unionById(tombstones, remoteTombstones);
    const tsIds=new Set(mergedTombstones.map(t=>t.id));
    const mergedEntries=applyTombstones(unionById(entries, remoteEntries), tsIds);
    const mergedExpenses=applyTombstones(unionById(expenses, remoteExpenses), tsIds);
    const mergedPhotos=applyTombstones(unionById(photos, remotePhotos), tsIds);
    const mergedTrips=applyTombstones(unionById(trips, remoteTrips), tsIds);
    const mergedTracks=applyTombstones(unionById(tracks, remoteTracks), tsIds);
    const mergedVehicles=mergeVehicles(vehicles, remoteVehicles);

    await idClear('entries'); for(const x of mergedEntries) await idPut('entries',x);
    await idClear('expenses'); for(const x of mergedExpenses) await idPut('expenses',x);
    await idClear('photos'); for(const x of mergedPhotos) await idPut('photos',x);
    await idClear('tombstones'); for(const x of mergedTombstones) await idPut('tombstones',x);
    await idClear('vehicles'); for(const x of mergedVehicles) await idPut('vehicles',x);
    await idClear('trips'); for(const x of mergedTrips) await idPut('trips',x);
    await idClear('tracks'); for(const x of mergedTracks) await idPut('tracks',x);
    await loadAll();
    render();

    const newFileId=await uploadRemote(fileId, {entries:mergedEntries, expenses:mergedExpenses, photos:mergedPhotos, tombstones:mergedTombstones, vehicles:mergedVehicles, trips:mergedTrips, tracks:mergedTracks, updatedAt:Date.now()});
    if(!syncFileId) syncFileId=newFileId;

    lastSyncAt=Date.now();
    localStorage.setItem('rb_lastSyncAt', String(lastSyncAt));
    googleConnected=true;
    localStorage.setItem('rb_googleConnected','1');
    setSyncStatus('');
    if(activeTab==='more' && moreView==='backup') renderBackup(document.getElementById('main'));
  }catch(err){
    setSyncStatus('');
    if(interactive) toast('Sync failed — check connection or reconnect');
    console.warn('roadbook sync error', err);
  }finally{
    syncInFlight=false;
    if(syncQueued){ syncQueued=false; syncNow(false); }
  }
}
function scheduleSync(){
  if(!googleConnected) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer=setTimeout(()=>syncNow(false), 1500);
}

async function connectGoogle(){
  setSyncStatus('Connecting…');
  const ok=await ensureTokenClient();
  if(!ok){ setSyncStatus(''); toast('Google sign-in unavailable — check connection'); return; }
  try{
    await requestToken(true);
    googleConnected=true;
    localStorage.setItem('rb_googleConnected','1');
    await syncNow(true);
    toast('Google connected');
  }catch(err){
    setSyncStatus('');
    toast('Could not connect Google account');
  }
  if(activeTab==='more' && moreView==='backup') renderBackup(document.getElementById('main'));
}
function disconnectGoogle(){
  if(!confirm('Disconnect Google account? Your data on this device is kept — you can reconnect any time.')) return;
  if(accessToken && window.google && google.accounts && google.accounts.oauth2 && google.accounts.oauth2.revoke){
    google.accounts.oauth2.revoke(accessToken, ()=>{});
  }
  accessToken=null; googleConnected=false; syncFileId=null; lastSyncAt=null;
  localStorage.removeItem('rb_googleConnected');
  localStorage.removeItem('rb_syncFileId');
  localStorage.removeItem('rb_lastSyncAt');
  toast('Google account disconnected');
  if(activeTab==='more' && moreView==='backup') renderBackup(document.getElementById('main'));
}

/* ---------- tabs ---------- */
function setActiveTabUI(){
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===activeTab));
  updateFabVisibility();
}
document.querySelectorAll('nav.tabs button').forEach(b=>{
  b.addEventListener('click',()=>{ activeTab=b.dataset.tab; if(activeTab!=='more') moreView=null; setActiveTabUI(); render(); });
});

/* ---------- boot ---------- */
(async function(){
  const dbTimeout=setTimeout(showDbBlockedMessage,6000);
  await openDB();
  clearTimeout(dbTimeout);
  await loadAll();
  setActiveTabUI();
  render();
  if(await waitForGis()){
    initGis();
    if(googleConnected) syncNow(false);
  }
  window.addEventListener('online', ()=>{ if(googleConnected) scheduleSync(); });
})();
