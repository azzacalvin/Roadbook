<!doctype html>
<!-- cache refresh nudge 2026-07-12 -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Roadbook</title>
<link rel="manifest" href="data:application/manifest+json,{}">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --sand:#F4E9D8;
    --sand-dark:#EADBC2;
    --sand-darker:#DFC9A5;
    --card:#FFFBF3;
    --ink:#3A2A1E;
    --ink-soft:#8A7660;
    --terracotta:#C1603C;
    --terracotta-dark:#A94E2E;
    --terracotta-ink:#FFF6EF;
    --rust:#A8452A;
    --ochre:#D69A34;
    --eucalypt:#6B8552;
    --line:#E3D2B4;
    --danger:#A8452A;
    --radius:14px;
    --radius-sm:9px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--sand);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
    padding-bottom:calc(92px + env(safe-area-inset-bottom));
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }
  :focus-visible{outline:2px solid var(--terracotta); outline-offset:2px;}
  h1,h2,h3{margin:0;}

  header.top{
    position:sticky; top:0; z-index:20;
    background:var(--sand);
    padding:16px 16px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  header.top h1{font-size:19px; font-weight:800; letter-spacing:-0.01em;}
  header.top .screenlabel{font-size:12px; color:var(--ink-soft); font-weight:600;}
  header.top .hdrright{display:flex; align-items:center; gap:10px;}
  .syncbtn{
    background:var(--card); border:1.5px solid var(--line); border-radius:50%;
    width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    font-size:16px; cursor:pointer; color:var(--terracotta-dark); padding:0;
  }
  .syncbtn.spinning{animation:rbspin 0.9s linear infinite;}
  @keyframes rbspin{to{transform:rotate(360deg);}}

  main{padding:6px 16px 8px;}

  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:12px;
    box-shadow:0 1px 2px rgba(58,42,30,0.08);
  }
  .greetcard{
    background:linear-gradient(135deg, var(--terracotta), var(--ochre));
    color:var(--terracotta-ink);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
  }
  .greetcard .eyebrow{font-size:11px; opacity:0.85; font-weight:600; letter-spacing:0.02em;}
  .greetcard h2{font-size:20px; margin-top:2px;}
  .greetcard .sub{font-size:12.5px; opacity:0.9; margin-top:2px;}

  .statrow{display:flex; gap:8px; margin-bottom:14px;}
  .statchip{
    flex:1; background:var(--card); border-radius:var(--radius-sm); padding:9px 6px; text-align:center;
    box-shadow:0 1px 2px rgba(58,42,30,0.06);
  }
  .statchip .val{font-size:16px; font-weight:800;}
  .statchip .lbl{font-size:9.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; margin-top:1px;}

  .sectitle{font-size:13px; font-weight:800; margin:6px 2px 8px; color:var(--ink);}

  .tilegrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .tile{
    background:var(--card); border-radius:var(--radius); padding:14px 12px; cursor:pointer;
    box-shadow:0 1px 2px rgba(58,42,30,0.08); text-align:left;
  }
  .tile .icon{font-size:20px;}
  .tile .label{font-size:12.5px; font-weight:700; margin-top:6px;}
  .tile .desc{font-size:10.5px; color:var(--ink-soft); margin-top:1px;}

  .tipcard{
    background:var(--sand-dark); border-radius:var(--radius); padding:14px; font-size:12.5px; color:var(--ink);
    margin-bottom:14px;
  }
  .tipcard .lbl{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.06em; color:var(--terracotta-dark); margin-bottom:4px;}

  .empty{
    padding:34px 12px; text-align:center; color:var(--ink-soft); font-size:13px;
    border:1.5px dashed var(--line); border-radius:var(--radius);
  }
  .empty .t{display:block; font-size:14px; font-weight:800; margin-bottom:6px; color:var(--ink);}

  .row{
    display:flex; gap:10px; padding:12px; margin-bottom:8px; cursor:pointer;
    background:var(--card); border-radius:var(--radius-sm); box-shadow:0 1px 2px rgba(58,42,30,0.06);
  }
  .row:active{background:var(--sand-dark);}
  .row .tag{flex:0 0 5px; border-radius:3px;}
  .row .body{flex:1; min-width:0;}
  .row .rowtop{display:flex; justify-content:space-between; gap:8px; align-items:baseline;}
  .row .kind{font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; font-weight:800;}
  .row .date{font-size:10px; color:var(--ink-soft); font-family:ui-monospace,monospace;}
  .row .note{font-size:13.5px; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .row .meta{font-size:10.5px; color:var(--ink-soft); margin-top:2px;}
  .row .amount{font-family:ui-monospace,monospace; font-weight:800; font-size:14px; white-space:nowrap;}

  .tag.campsite{background:var(--eucalypt);}
  .tag.fuel{background:var(--rust);}
  .tag.poi{background:var(--ochre);}
  .tag.note{background:var(--ink-soft);}
  .kind.campsite{color:var(--eucalypt);}
  .kind.fuel{color:var(--rust);}
  .kind.poi{color:var(--ochre);}
  .kind.note{color:var(--ink-soft);}

  .photogrid{display:grid; grid-template-columns:repeat(3,1fr); gap:5px;}
  .photogrid .thumb{
    aspect-ratio:1; overflow:hidden; background:var(--sand-dark); border-radius:var(--radius-sm);
    position:relative; cursor:pointer;
  }
  .photogrid img{width:100%; height:100%; object-fit:cover; display:block;}

  .fab{
    position:fixed; right:18px; bottom:78px; z-index:25;
    width:56px; height:56px; border-radius:50%;
    background:var(--terracotta); color:var(--terracotta-ink);
    border:none; font-size:26px; font-weight:400;
    box-shadow:0 3px 10px rgba(168,69,42,0.4);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .fab:active{transform:scale(0.94);}

  nav.tabs{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    display:flex; background:var(--card);
    border-top:1px solid var(--line);
    padding:6px 2px calc(6px + env(safe-area-inset-bottom));
  }
  nav.tabs button{
    flex:1; background:none; border:none; padding:6px 2px;
    font-size:9.5px; font-weight:700; letter-spacing:0.01em;
    color:var(--ink-soft); cursor:pointer; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  nav.tabs button .ic{font-size:18px;}
  nav.tabs button.active{color:var(--terracotta-dark);}

  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(58,42,30,0.45); z-index:40;
    opacity:0; pointer-events:none; transition:opacity 0.18s ease;
  }
  .sheet-backdrop.open{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:41;
    background:var(--sand);
    border-radius:18px 18px 0 0;
    max-height:88vh; overflow-y:auto;
    transform:translateY(100%);
    transition:transform 0.22s ease;
    padding:18px 16px calc(20px + env(safe-area-inset-bottom));
  }
  .sheet.open{transform:translateY(0);}
  .sheet h2{font-size:16px; margin-bottom:14px;}
  .sheet .closebtn{
    position:absolute; top:12px; right:14px; background:none; border:none;
    font-size:18px; color:var(--ink-soft); cursor:pointer; padding:4px;
  }

  .field{margin-bottom:12px;}
  .field label{
    display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--ink-soft); margin-bottom:5px; font-weight:800;
  }
  .field input[type=text], .field input[type=number], .field input[type=date], .field textarea, .field select{
    width:100%; padding:10px 11px; border:1.5px solid var(--line); background:var(--card);
    font-size:14px; font-family:inherit; color:var(--ink); border-radius:var(--radius-sm);
  }
  .field textarea{resize:vertical; min-height:60px;}
  .typegrid{display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}
  .typegrid button{
    padding:9px 2px; border:1.5px solid var(--line); background:var(--card); border-radius:var(--radius-sm);
    font-size:9.5px; text-transform:uppercase; letter-spacing:0.04em; font-weight:800; cursor:pointer;
    color:var(--ink-soft); font-family:inherit;
  }
  .typegrid button.selected{background:var(--terracotta); border-color:var(--terracotta); color:var(--terracotta-ink);}

  .geobtn, .photobtn{
    width:100%; padding:11px; border:1.5px dashed var(--line); background:none; border-radius:var(--radius-sm);
    font-size:12.5px; cursor:pointer; color:var(--ink); font-family:inherit; text-align:left;
  }
  .geobtn.got, .photobtn.got{border-style:solid; background:var(--card);}
  .geo-readout{font-family:ui-monospace,monospace; font-size:11px; color:var(--ink-soft); margin-top:4px;}

  .thumbrow{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
  .thumbrow .t{width:56px; height:56px; border-radius:var(--radius-sm); border:1px solid var(--line); overflow:hidden;}
  .thumbrow .t img{width:100%; height:100%; object-fit:cover;}

  .actions{display:flex; gap:8px; margin-top:16px;}
  .btn{
    flex:1; padding:13px; border:none; border-radius:var(--radius-sm); font-size:12.5px;
    text-transform:uppercase; letter-spacing:0.05em; font-weight:800; cursor:pointer; font-family:inherit;
  }
  .btn.primary{background:var(--terracotta); color:var(--terracotta-ink);}
  .btn.ghost{background:none; border:1.5px solid var(--ink); color:var(--ink);}
  .btn.danger{background:var(--danger); color:#FFF1EC;}

  .block{border-radius:var(--radius); padding:15px; margin-bottom:12px; background:var(--card); box-shadow:0 1px 2px rgba(58,42,30,0.06);}
  .block h3{font-size:12.5px; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px;}
  .block p{font-size:12px; color:var(--ink-soft); margin:0 0 10px;}

  .menurow{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:15px; background:var(--card); border-radius:var(--radius); margin-bottom:10px; cursor:pointer;
    box-shadow:0 1px 2px rgba(58,42,30,0.06);
  }
  .menurow .left{display:flex; align-items:center; gap:12px;}
  .menurow .ic{font-size:20px;}
  .menurow .label{font-size:13.5px; font-weight:700;}
  .menurow .chev{color:var(--ink-soft); font-size:16px;}
  .backrow{display:flex; align-items:center; gap:8px; margin-bottom:12px; cursor:pointer;}
  .backrow .arrow{font-size:16px;}
  .backrow .label{font-size:13px; font-weight:700; color:var(--ink-soft);}

  .badge{
    display:inline-block; padding:3px 9px; border-radius:20px; font-size:9.5px; font-weight:800;
    text-transform:uppercase; letter-spacing:0.04em;
  }
  .badge.planning{background:var(--sand-darker); color:var(--terracotta-dark);}
  .badge.active{background:var(--terracotta); color:var(--terracotta-ink);}
  .badge.completed{background:var(--eucalypt); color:#F1F6EC;}

  .tripcard{background:var(--card); border-radius:var(--radius); padding:14px; margin-bottom:10px; cursor:pointer; box-shadow:0 1px 2px rgba(58,42,30,0.06);}
  .tripcard .toprow{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .tripcard .name{font-size:14.5px; font-weight:800;}
  .tripcard .dates{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .tripcard .stopcount{font-size:11px; color:var(--ink-soft); margin-top:6px;}

  .stoplistitem{display:flex; align-items:center; gap:8px; background:var(--card); border-radius:var(--radius-sm); padding:9px 10px; margin-bottom:6px;}
  .stoplistitem .num{font-family:ui-monospace,monospace; font-size:11px; color:var(--ink-soft); flex:0 0 16px;}
  .stoplistitem .nm{flex:1; font-size:13px;}
  .stoplistitem button{background:none; border:none; color:var(--ink-soft); font-size:15px; cursor:pointer; padding:2px 5px;}

  .vehform{margin-bottom:6px;}
  .toast{
    position:fixed; left:50%; bottom:100px; transform:translateX(-50%);
    background:var(--ink); color:var(--sand); padding:10px 18px; font-size:12.5px;
    border-radius:10px; z-index:60; opacity:0; pointer-events:none; transition:opacity 0.2s ease;
  }
  .toast.show{opacity:1;}
  input[type=file]{display:none;}
  .recbar{
    background:var(--card); border-radius:var(--radius); padding:13px 14px; margin-bottom:12px;
    display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 2px rgba(58,42,30,0.06);
  }
  .recbar.live{background:var(--terracotta); color:var(--terracotta-ink);}
  .recbar .readout{font-family:ui-monospace,monospace; font-size:13px; font-weight:700;}
</style>
</head>
<body>

<header class="top">
  <h1>Roadbook</h1>
  <div class="hdrright">
    <span class="screenlabel" id="screenLabel">Home</span>
    <button class="syncbtn" id="syncBtn" title="Sync now">🔄</button>
  </div>
</header>

<main id="main"></main>

<button class="fab" id="fab">+</button>

<nav class="tabs">
  <button data-tab="home" class="active"><span class="ic">🏠</span>Home</button>
  <button data-tab="log"><span class="ic">📍</span>Log</button>
  <button data-tab="trips"><span class="ic">🗺️</span>Trips</button>
  <button data-tab="van"><span class="ic">🚐</span>Van</button>
  <button data-tab="more"><span class="ic">⋯</span>More</button>
</nav>

<div class="sheet-backdrop" id="backdrop"></div>

<!-- Log entry sheet -->
<div class="sheet" id="sheetLog">
  <button class="closebtn" data-close>✕</button>
  <h2>New stop</h2>
  <div class="field">
    <label>Type</label>
    <div class="typegrid" id="typeGrid">
      <button data-type="campsite" class="selected">Campsite</button>
      <button data-type="poi">Point of interest</button>
      <button data-type="fuel">Fuel stop</button>
      <button data-type="note">Note</button>
    </div>
  </div>
  <div class="field">
    <label>Note</label>
    <textarea id="logNote" placeholder="What's here — site number, view, conditions..."></textarea>
  </div>
  <div class="field">
    <label>Location</label>
    <button class="geobtn" id="logGeoBtn">📍 Capture current location</button>
    <div class="geo-readout" id="logGeoReadout"></div>
  </div>
  <div class="field">
    <label>Photos</label>
    <button class="photobtn" id="logPhotoBtn">📷 Add photo</button>
    <input type="file" id="logPhotoInput" accept="image/*" capture="environment" multiple>
    <div class="thumbrow" id="logThumbs"></div>
  </div>
  <div class="actions">
    <button class="btn ghost" data-close>Cancel</button>
    <button class="btn primary" id="logSave">Save stop</button>
  </div>
</div>

<!-- Expense sheet -->
<div class="sheet" id="sheetSpend">
  <button class="closebtn" data-close>✕</button>
  <h2>New expense</h2>
  <div class="field">
    <label>Category</label>
    <div class="typegrid" id="catGrid">
      <button data-cat="Fuel" class="selected">Fuel</button>
      <button data-cat="Camp fees">Camp fees</button>
      <button data-cat="Food">Food</button>
      <button data-cat="Repairs">Repairs</button>
      <button data-cat="Other">Other</button>
    </div>
  </div>
  <div class="field">
    <label>Amount ($)</label>
    <input type="number" id="spendAmount" inputmode="decimal" step="0.01" placeholder="0.00">
  </div>
  <div class="field">
    <label>Odometer (km)</label>
    <input type="number" id="spendOdo" inputmode="numeric" placeholder="optional">
  </div>
  <div class="field">
    <label>Note</label>
    <input type="text" id="spendNote" placeholder="optional">
  </div>
  <div class="field">
    <label>Location</label>
    <button class="geobtn" id="spendGeoBtn">📍 Capture current location</button>
    <div class="geo-readout" id="spendGeoReadout"></div>
  </div>
  <div class="actions">
    <button class="btn ghost" data-close>Cancel</button>
    <button class="btn primary" id="spendSave">Save expense</button>
  </div>
</div>

<!-- Trip sheet -->
<div class="sheet" id="sheetTrip">
  <button class="closebtn" data-close>✕</button>
  <h2 id="tripSheetTitle">New trip</h2>
  <div class="field">
    <label>Trip name</label>
    <input type="text" id="tripName" placeholder="e.g. Gulf loop, Cape trip...">
  </div>
  <div class="field">
    <label>Start date</label>
    <input type="date" id="tripStart">
  </div>
  <div class="field">
    <label>End date</label>
    <input type="date" id="tripEnd">
  </div>
  <div class="field">
    <label>Status</label>
    <div class="typegrid" id="tripStatusGrid" style="grid-template-columns:repeat(3,1fr);">
      <button data-status="planning" class="selected">Planning</button>
      <button data-status="active">Active</button>
      <button data-status="completed">Completed</button>
    </div>
  </div>
  <div class="field">
    <label>Notes</label>
    <textarea id="tripNotes" placeholder="optional"></textarea>
  </div>
  <div class="field">
    <label>Stops (in order)</label>
    <div id="tripStopList"></div>
    <div style="display:flex; gap:6px; margin-top:6px;">
      <input type="text" id="tripStopName" placeholder="Stop name" style="flex:1; padding:9px 10px; border:1.5px solid var(--line); border-radius:9px; font-size:13px;">
      <button class="btn ghost" id="tripStopAddHere" style="flex:0 0 auto; padding:9px 12px;">📍 Here</button>
      <button class="btn primary" id="tripStopAdd" style="flex:0 0 auto; padding:9px 14px;">Add</button>
    </div>
  </div>
  <div class="actions">
    <button class="btn ghost" data-close>Cancel</button>
    <button class="btn primary" id="tripSave">Save trip</button>
  </div>
</div>

<!-- Link a past (unrecorded) trip sheet -->
<div class="sheet" id="sheetLinkRoute">
  <button class="closebtn" data-close>✕</button>
  <h2>Link a past trip</h2>
  <div class="field">
    <label>Route name</label>
    <input type="text" id="linkRouteName" placeholder="e.g. Gulf loop 2023">
  </div>
  <div class="field">
    <label>Date</label>
    <input type="date" id="linkRouteDate">
  </div>
  <div class="field">
    <label>Link</label>
    <input type="text" id="linkRouteUrl" placeholder="Google Maps, Strava, photo album...">
  </div>
  <div class="field">
    <label>Notes</label>
    <input type="text" id="linkRouteNotes" placeholder="optional">
  </div>
  <div class="actions">
    <button class="btn ghost" data-close>Cancel</button>
    <button class="btn primary" id="linkRouteSave">Save</button>
  </div>
</div>

<!-- Detail / view sheet -->
<div class="sheet" id="sheetDetail">
  <button class="closebtn" data-close>✕</button>
  <div id="detailBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- storage ---------- */
const DB_NAME='roadbook', DB_VER=3;
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('entries')) d.createObjectStore('entries',{keyPath:'id'});
      if(!d.objectStoreNames.contains('expenses')) d.createObjectStore('expenses',{keyPath:'id'});
      if(!d.objectStoreNames.contains('photos')) d.createObjectStore('photos',{keyPath:'id'});
      if(!d.objectStoreNames.contains('tombstones')) d.createObjectStore('tombstones',{keyPath:'id'});
      if(!d.objectStoreNames.contains('vehicles')) d.createObjectStore('vehicles',{keyPath:'id'});
      if(!d.objectStoreNames.contains('trips')) d.createObjectStore('trips',{keyPath:'id'});
      if(!d.objectStoreNames.contains('tracks')) d.createObjectStore('tracks',{keyPath:'id'});
    };
    r.onblocked=()=>{
      showDbBlockedMessage();
    };
    r.onsuccess=e=>{
      db=e.target.result;
      db.onversionchange=()=>{ db.close(); showDbBlockedMessage(); };
      res(db);
    };
    r.onerror=e=>rej(e);
  });
}
function showDbBlockedMessage(){
  const main=document.getElementById('main');
  if(!main) return;
  main.innerHTML=`<div class="empty"><span class="t">Update needs a refresh</span>Roadbook is open in another tab or window, which is blocking this update. Close any other Roadbook tabs on this device, then reload this page.<br><br><button class="btn primary" onclick="location.reload()" style="margin-top:10px;">Reload now</button></div>`;
}
function tx(store,mode='readonly'){return db.transaction(store,mode).objectStore(store);}
function idAll(store){
  return new Promise(res=>{
    const out=[]; const req=tx(store).openCursor();
    req.onsuccess=e=>{const c=e.target.result; if(c){out.push(c.value); c.continue();} else res(out);};
  });
}
function idPut(store,val){return new Promise(res=>{const r=tx(store,'readwrite').put(val); r.onsuccess=()=>res();});}
function idDelete(store,id){return new Promise(res=>{const r=tx(store,'readwrite').delete(id); r.onsuccess=()=>res();});}
function idClear(store){return new Promise(res=>{const r=tx(store,'readwrite').clear(); r.onsuccess=()=>res();});}
function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}

/* ---------- state ---------- */
let entries=[], expenses=[], photos=[], tombstones=[], vehicles=[], trips=[], tracks=[];
let activeTab='home';
let moreView=null; // null | 'spend' | 'photos' | 'assistant' | 'backup' | 'travel'
let allTravelMode='timeline'; // 'timeline' | 'bytrip'
let pendingGeo={log:null, spend:null, tripstop:null};
let pendingPhotos=[];
let pendingTripStops=[];
let editingTripId=null;

async function loadAll(){
  entries = (await idAll('entries')).sort((a,b)=>b.ts-a.ts);
  expenses = (await idAll('expenses')).sort((a,b)=>b.ts-a.ts);
  photos = await idAll('photos');
  tombstones = await idAll('tombstones');
  vehicles = await idAll('vehicles');
  trips = (await idAll('trips')).sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||''));
  tracks = (await idAll('tracks')).sort((a,b)=>b.startTs-a.startTs);
}

/* ---------- helpers ---------- */
function fmtDate(ts){
  if(!ts) return '—';
  const d=new Date(ts);
  return d.toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'2-digit'});
}
function fmtTime(ts){
  const d=new Date(ts);
  return d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}
function haversine(lat1,lon1,lat2,lon2){
  const R=6371, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toast._h); toast._h=setTimeout(()=>t.classList.remove('show'),1800);
}
function typeLabel(t){
  return {campsite:'Campsite',poi:'Point of interest',fuel:'Fuel stop',note:'Note'}[t]||t;
}
function catColor(cat){
  return {Fuel:'var(--rust)','Camp fees':'var(--eucalypt)',Food:'var(--ochre)',Repairs:'var(--terracotta)',Other:'var(--ink-soft)'}[cat]||'var(--ink-soft)';
}
function catColorForType(t){
  return {campsite:'var(--eucalypt)',poi:'var(--ochre)',fuel:'var(--rust)',note:'var(--ink-soft)'}[t]||'var(--ink)';
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
const TIPS=[
  'Download offline maps before heading into remote areas — mobile coverage is unreliable in the outback.',
  'Check your tyre pressures (car and van) before every long leg — heat and load change them fast.',
  'Top up water whenever you pass a tap, even if you are not low — the next one might be further than you think.',
  'Log fuel stops as you go — it makes the range-per-tank math on remote legs much easier.',
  'A tyre pressure gauge and a 12V compressor are cheap insurance on corrugated roads.',
  'Weigh your rig loaded at least once — it is easy to be over your ATM without realising.',
  'Book caravan parks ahead in school holidays; free camps fill up early too in popular spots.',
  'Keep a paper map as backup — phones die, batteries drain, coverage drops out.',
  'Check gas bottle levels before long remote stretches, especially in cooler months.',
  'A UHF radio is worth it for road-train and blind-corner etiquette on outback highways.',
  'Rotate your fridge/freezer stock so nothing goes off before a big fuel-free stretch.',
  'Take photos of your tow setup (hitch, safety chains, wiring) so you can sanity-check it at each stop.',
  'Plan fuel stops around known long gaps — some outback roads have 200km+ between servos.',
  'Dust-proof your van vents and door seals before corrugated dirt roads.',
  'Keep a physical copy of your rego, insurance, and roadside assist numbers — not just on your phone.'
];
function tipOfDay(){
  const day=Math.floor(Date.now()/86400000);
  return TIPS[day % TIPS.length];
}

/* ---------- render dispatcher ---------- */
const SCREEN_LABELS={home:'Home',log:'Log',trips:'Trips',van:'My Van',more:'More'};
function render(){
  document.getElementById('screenLabel').textContent = SCREEN_LABELS[activeTab] || '';
  const main=document.getElementById('main');
  if(activeTab==='home') return renderHome(main);
  if(activeTab==='log') return renderLog(main);
  if(activeTab==='trips') return renderTrips(main);
  if(activeTab==='van') return renderVan(main);
  if(activeTab==='more') return renderMore(main);
}

/* ---------- HOME ---------- */
function renderHome(main){
  const car=vehicles.find(v=>v.id==='car');
  const van=vehicles.find(v=>v.id==='caravan');
  const rigName = (van&&van.nickname) || (car&&car.nickname) || 'Set up your rig';
  const plannedCount = trips.filter(t=>t.status==='planning'||t.status==='active').length;
  const spend=expenses.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const withGeo = entries.filter(e=>e.lat!=null).sort((a,b)=>a.ts-b.ts);

  const recBarHtml = recording ? `
    <div class="recbar live">
      <div><div style="font-size:11px; opacity:0.85; text-transform:uppercase; letter-spacing:0.05em; font-weight:800;">Recording route</div><div class="readout" id="recordReadout">0:00 · 0.0 km</div></div>
      <button class="btn ghost" id="recStopBtn" style="flex:0 0 auto; background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.6); color:#fff;">Stop</button>

    <div class="recbar">
      <div><div style="font-size:11px; text-transform:uppercase; letter-spacing:0.05em; font-weight:800; color:var(--ink-soft);">Trip recorder</div><div style="font-size:12px; color:var(--ink-soft);">Track your route while driving</div></div>
      <button class="btn primary" id="recStartBtn" style="flex:0 0 auto;">Start</button>
    </div>`;

    <div class="greetcard">
      <div class="eyebrow">Welcome back</div>
      <h2>${escapeHtml(rigName)}</h2>
      <div class="sub">${plannedCount} trip${plannedCount===1?'':'s'} planned</div>
    </div>

    <div class="statrow">
      <div class="statchip"><div class="val">${entries.length}</div><div class="lbl">Stops</div></div>
      <div class="statchip"><div class="val">${Math.round(km)}</div><div class="lbl">Km logged</div></div>
      <div class="statchip"><div class="val">$${Math.round(spend)}</div><div class="lbl">Spent</div></div>
    </div>
    <div class="sectitle">Quick actions</div>
    <div class="tilegrid">
      <button class="tile" id="tileLog"><div class="icon">📍</div><div class="label">Log a stop</div><div class="desc">Campsite, fuel, note...</div></button>
      <button class="tile" id="tileSpend"><div class="icon">💵</div><div class="label">Log expense</div><div class="desc">Fuel, camp fees...</div></button>

    </div>
    ${upcoming.length?`
    <div class="sectitle">Upcoming trips</div>
    ${upcoming.map(t=>`<div class="tripcard" data-open-trip="${t.id}">
      <div class="toprow">
        <div><div class="name">${escapeHtml(t.name)}</div><div class="dates">${t.startDate?fmtDate(new Date(t.startDate).getTime()):''}${t.endDate?' – '+fmtDate(new Date(t.endDate).getTime()):''}</div></div>
        <span class="badge ${t.status}">${t.status}</span>
      </div>
      <div class="stopcount">${(t.stops||[]).length} stop${(t.stops||[]).length===1?'':'s'}</div>

    `:''}

/* ---------- LOG ---------- */

  const recBar = recording ? `

      <div><div style="font-size:11px; opacity:0.85; text-transform:uppercase; letter-spacing:0.05em; font-weight:800;">Recording route</div><div class="readout" id="recordReadout">0:00 · 0.0 km</div></div>

    </div>` : `
    <div class="recbar">
      <div><div style="font-size:11px; text-transform:uppercase; letter-spacing:0.05em; font-weight:800; color:var(--ink-soft);">Trip recorder</div><div style="font-size:12px; color:var(--ink-soft);">Track your route while driving</div></div>
      <button class="btn primary" id="recStartBtn" style="flex:0 0 auto;">Start</button>
    </div>`;

  const linkRouteRow = `<button class="btn ghost" id="linkPastTripBtn" style="width:100%; margin-bottom:12px;">Link a past trip that was not recorded</button>`;

  const list = !entries.length ? '<div class="empty"><span class="t">No stops yet</span>Tap + to log a campsite, fuel stop, or note.</div>' :
    entries.map(e=>{
      const loc = e.lat!=null ? `${e.lat.toFixed(4)}, ${e.lon.toFixed(4)}` : 'No location';
      const photoCount = (e.photoIds||[]).length;
      return `<div class="row" data-open-entry="${e.id}">

        <div class="body">
          <div class="rowtop">

          <div class="meta">${loc}${photoCount?' · '+photoCount+' photo'+(photoCount>1?'s':''):''}</div>
        </div>

    <div class="sectitle">Recorded routes</div>
    ${tracks.map(t=>`<div class="row" data-open-track="${t.id}">
      <div class="tag" style="background:var(--terracotta)"></div>

        <div class="meta">${t.distanceKm!=null ? t.distanceKm.toFixed(1)+' km · '+Math.max(1,Math.round((t.endTs-t.startTs)/60000))+' min' : (t.externalLink?'Linked route':'')}</div>
      </div>
    </div>`).join('')}

    document.getElementById('recStopBtn').onclick=stopRecording;
    updateRecordingReadout();

    document.getElementById('recStartBtn').onclick=startRecording;
  }
  document.getElementById('linkPastTripBtn').onclick=openLinkRouteSheet;
  main.querySelectorAll('[data-open-entry]').forEach(el=>{
    el.addEventListener('click',()=>openEntryDetail(el.dataset.openEntry));
  });
  main.querySelectorAll('[data-open-track]').forEach(el=>{
    el.addEventListener('click',()=>openTrackDetail(el.dataset.openTrack));
  });
}

/* ---------- SPEND (inside More) ---------- */
function renderSpend(main){
  const list = !expenses.length ? '<div class="empty"><span class="t">No expenses yet</span>Tap + to log fuel, camp fees, food, or repairs.</div>' :
    expenses.map(e=>{
      const loc = e.lat!=null ? `${e.lat.toFixed(4)}, ${e.lon.toFixed(4)}` : '';
      const odo = e.odo ? 'Odo '+e.odo+'km' : '';
      const meta=[odo,loc].filter(Boolean).join(' · ');
      return `<div class="row" data-open-expense="${e.id}">
        <div class="tag" style="background:${catColor(e.category)}"></div>
        <div class="body">
          <div class="rowtop">
            <span class="kind" style="color:${catColor(e.category)}">${e.category}</span>
            <span class="date">${fmtDate(e.ts)}</span>
          </div>
          <div class="note">${escapeHtml(e.note||e.category)}</div>

        </div>

  main.innerHTML = backRow('More') + '<div class="sectitle">Spend</div>' + list;
  wireBackRow(main);
  main.querySelectorAll('[data-open-expense]').forEach(el=>{
    el.addEventListener('click',()=>openExpenseDetail(el.dataset.openExpense));
  });
}

function backRow(label){
  return `<div class="backrow" id="backRow"><span class="arrow">←</span><span class="label">${label}</span></div>`;
}
function wireBackRow(main){
  const el=main.querySelector('#backRow');
  if(el) el.addEventListener('click',()=>{ moreView=null; setActiveTabUI(); render(); });
}

/* ---------- ALL TRAVEL (combined view) ---------- */
function travelEntryRow(e){
  const loc = e.lat!=null ? `${e.lat.toFixed(4)}, ${e.lon.toFixed(4)}` : 'No location';
  const photoCount = (e.photoIds||[]).length;
  return `<div class="row" data-open-entry="${e.id}">
    <div class="tag ${e.type}"></div>
    <div class="body">
      <div class="rowtop">
        <span class="kind ${e.type}">${typeLabel(e.type)}</span>
        <span class="date">${fmtDate(e.ts)} ${fmtTime(e.ts)}</span>
      </div>
      <div class="note">${escapeHtml(e.note||'(no note)')}</div>
      <div class="meta">${loc}${photoCount?' · '+photoCount+' photo'+(photoCount>1?'s':''):''}</div>
    </div>
  </div>`;
}
function travelTrackRow(t){
  return `<div class="row" data-open-track="${t.id}">
    <div class="tag" style="background:var(--terracotta)"></div>
    <div class="body">
      <div class="rowtop"><span class="kind" style="color:var(--terracotta-dark)">${escapeHtml(t.name)}${t.externalLink?' (link)':''}</span><span class="date">${fmtDate(t.startTs)}</span></div>
      <div class="meta">${t.distanceKm!=null ? t.distanceKm.toFixed(1)+' km · '+Math.max(1,Math.round((t.endTs-t.startTs)/60000))+' min' : (t.externalLink?'Linked route':'')}</div>
    </div>
  </div>`;
}
function renderTravelTimeline(){
  const items = [
    ...entries.map(e=>({ts:e.ts, html:travelEntryRow(e)})),
    ...tracks.map(t=>({ts:t.startTs, html:travelTrackRow(t)}))
  ].sort((a,b)=>b.ts-a.ts);
  if(!items.length) return '<div class="empty"><span class="t">Nothing logged yet</span>Stops and routes you add will show up here.</div>';
  return items.map(i=>i.html).join('');
}
function renderTravelByTrip(){
  const sortedTrips = trips.slice().sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||''));
  const usedTrackIds = new Set();
  const usedEntryIds = new Set();
  let html = '';
  sortedTrips.forEach(t=>{
    const tTracks = tracks.filter(tr=>tr.tripId===t.id);
    tTracks.forEach(tr=>usedTrackIds.add(tr.id));
    let tEntries = [];
    if(t.startDate && t.endDate){
      const startTs = new Date(t.startDate+'T00:00:00').getTime();
      const endTs = new Date(t.endDate+'T23:59:59').getTime();
      tEntries = entries.filter(e=>e.ts>=startTs && e.ts<=endTs);
      tEntries.forEach(e=>usedEntryIds.add(e.id));
    }
    html += `<div class="sectitle" style="margin-top:14px; cursor:pointer;" data-open-trip-travel="${t.id}">${escapeHtml(t.name)} <span class="badge ${t.status}" style="margin-left:6px;">${t.status}</span></div>`;
    if(!tTracks.length && !tEntries.length){
      html += '<div class="meta" style="margin-bottom:8px;">Nothing logged for this trip yet</div>';
    } else {
      html += tTracks.map(travelTrackRow).join('') + tEntries.map(travelEntryRow).join('');
    }
  });
  const unassignedTracks = tracks.filter(tr=>!usedTrackIds.has(tr.id));
  const unassignedEntries = entries.filter(e=>!usedEntryIds.has(e.id));
  if(unassignedTracks.length || unassignedEntries.length){
    html += `<div class="sectitle" style="margin-top:14px;">Unassigned</div>`;
    html += unassignedTracks.map(travelTrackRow).join('') + unassignedEntries.map(travelEntryRow).join('');
  }
  if(!html) html = '<div class="empty"><span class="t">Nothing logged yet</span>Plan a trip and start logging to see it here.</div>';
  return html;
}
function wireTravelRowClicks(main){
  main.querySelectorAll('[data-open-entry]').forEach(el=>{
    el.addEventListener('click',()=>openEntryDetail(el.dataset.openEntry));
  });
  main.querySelectorAll('[data-open-track]').forEach(el=>{
    el.addEventListener('click',()=>openTrackDetail(el.dataset.openTrack));
  });
  main.querySelectorAll('[data-open-trip-travel]').forEach(el=>{
    el.addEventListener('click',()=>{ activeTab='trips'; setActiveTabUI(); render(); openTripDetail(el.dataset.openTripTravel); });
  });
}
function renderAllTravel(main){
  const toggle = `<div class="typegrid" style="grid-template-columns:repeat(2,1fr); margin-bottom:14px;" id="travelModeGrid">
    <button data-mode="timeline" class="${allTravelMode==='timeline'?'selected':''}">Timeline</button>
    <button data-mode="bytrip" class="${allTravelMode==='bytrip'?'selected':''}">By Trip</button>
  </div>`;
  const body = allTravelMode==='timeline' ? renderTravelTimeline() : renderTravelByTrip();
  main.innerHTML = backRow('More') + '<div class="sectitle">All Travel</div>' + toggle + body;
  wireBackRow(main);
  main.querySelectorAll('#travelModeGrid button').forEach(b=>{
    b.addEventListener('click',()=>{ allTravelMode=b.dataset.mode; renderAllTravel(main); });
  });
  wireTravelRowClicks(main);
}

function buildMapsLink(stops){
  const pts=(stops||[]).filter(s=>s.lat!=null || (s.name&&s.name.trim()));
  if(!pts.length) return null;
  const toParam=s=> s.lat!=null ? `${s.lat},${s.lon}` : encodeURIComponent(s.name);
  if(pts.length===1) return `https://www.google.com/maps/dir/?api=1&destination=${toParam(pts[0])}&travelmode=driving`;
  const destination=toParam(pts[pts.length-1]);
  const waypoints=pts.slice(0,-1).map(toParam).join('|');
  return `https://www.google.com/maps/dir/?api=1&destination=${destination}&waypoints=${waypoints}&travelmode=driving`;
}

function parseGoogleMapsCoords(url){
  if(!url) return null;
  let m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]), lon:parseFloat(m[2])};
  m = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]), lon:parseFloat(m[2])};
  m = url.match(/destination=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]), lon:parseFloat(m[2])};
  m = url.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]), lon:parseFloat(m[2])};
  return null;
}

    await loadAll(); closeSheets(); render(); toast('Route deleted'); scheduleSync();
  };
  openSheet('sheetDetail');
}
function buildTrackMapsLink(points){
  if(!points || points.length<2) return null;
  const maxWaypoints=8;
  let sampled=points;
  if(points.length>maxWaypoints+2){
    const step=Math.ceil(points.length/(maxWaypoints+2));
    sampled=[]; for(let i=0;i<points.length;i+=step) sampled.push(points[i]);
    if(sampled[sampled.length-1]!==points[points.length-1]) sampled.push(points[points.length-1]);
  }
  const toParam=p=>`${p.lat},${p.lon}`;
  const destination=toParam(sampled[sampled.length-1]);
  const waypoints=sampled.slice(0,-1).map(toParam).join('|');
  return `https://www.google.com/maps/dir/?api=1&destination=${destination}&waypoints=${waypoints}&travelmode=driving`;
}

function captureGeo(which){
  const btn=document.getElementById(which+'GeoBtn');
  const readout=document.getElementById(which+'GeoReadout');
  if(!navigator.geolocation){ readout.textContent='Location not available on this device.'; return; }
  btn.textContent='📍 Locating…';
  navigator.geolocation.getCurrentPosition(pos=>{
    pendingGeo[which]={lat:pos.coords.latitude, lon:pos.coords.longitude};
    btn.textContent='📍 Location captured';
    btn.classList.add('got');
    readout.textContent=pos.coords.latitude.toFixed(5)+', '+pos.coords.longitude.toFixed(5)+' (±'+Math.round(pos.coords.accuracy)+'m)';
  },err=>{
    btn.textContent='📍 Capture current location';
    readout.textContent='Could not get location — check permission, try again.';
  },{enableHighAccuracy:true, timeout:15000});
}

function resizeImage(file){
  return new Promise(resolve=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=e=>{ img.onload=()=>{
      const maxW=1280;
      const scale=Math.min(1, maxW/img.width);
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.72));
    }; img.src=e.target.result; };
    reader.readAsDataURL(file);
  });
}

/* ---------- trip recorder (start/stop GPS route) ---------- */
let recording=false, recordWatchId=null, recordPoints=[], recordStartTs=null, recordTimerInterval=null;
function startRecording(){
  if(!navigator.geolocation){ toast('Location not available on this device.'); return; }
  recording=true; recordPoints=[]; recordStartTs=Date.now();
  recordWatchId=navigator.geolocation.watchPosition(pos=>{
    recordPoints.push({lat:pos.coords.latitude, lon:pos.coords.longitude, ts:Date.now()});
    updateRecordingReadout();
  }, err=>{ toast('Location error — check permission'); }, {enableHighAccuracy:true, maximumAge:5000, timeout:20000});
  recordTimerInterval=setInterval(updateRecordingReadout,1000);
  if(activeTab==='log'||activeTab==='home') render();
  toast('Recording started — keep the app open while driving');
}
async function stopRecording(){
  if(recordWatchId!=null) navigator.geolocation.clearWatch(recordWatchId);
  clearInterval(recordTimerInterval);
  recording=false;
  const pts=recordPoints; recordPoints=[];
  if(pts.length<2){ toast('Not enough GPS points captured'); if(activeTab==='log'||activeTab==='home') render(); return; }
  let dist=0; for(let i=1;i<pts.length;i++) dist+=haversine(pts[i-1].lat,pts[i-1].lon,pts[i].lat,pts[i].lon);
  const name=prompt('Name this route (optional):','') || ('Route '+fmtDate(recordStartTs));
  const track={id:newId(), name, startTs:recordStartTs, endTs:Date.now(), points:pts, distanceKm:dist, tripId:null, updatedAt:Date.now()};
  await idPut('tracks', track);
  await loadAll();
  if(activeTab==='log'||activeTab==='home') render();
  toast('Route saved'); scheduleSync();
}
function updateRecordingReadout(){
  const el=document.getElementById('recordReadout');
  if(!el) return;
  const secs=Math.floor((Date.now()-recordStartTs)/1000);
  const mins=Math.floor(secs/60), s=secs%60;
  let dist=0; for(let i=1;i<recordPoints.length;i++) dist+=haversine(recordPoints[i-1].lat,recordPoints[i-1].lon,recordPoints[i].lat,recordPoints[i].lon);
  el.textContent = mins+':'+String(s).padStart(2,'0')+' · '+dist.toFixed(1)+' km';
}

/* ---------- export / import ---------- */
function download(filename, content, type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
async function shareOrDownload(filename, content, type){
  try{
    const file=new File([content], filename, {type});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:filename});
      toast('Choose Drive from the share sheet to save it there');
      return;
    }
  }catch(err){
    if(err && err.name==='AbortError') return;
  }
  download(filename, content, type);
  toast('Saved to Downloads — open the Drive app to upload it');
}
function exportJson(){
  const payload={version:2, exportedAt:new Date().toISOString(), entries, expenses, photos, vehicles, trips, tracks};
  shareOrDownload('roadbook-backup-'+new Date().toISOString().slice(0,10)+'.json', JSON.stringify(payload), 'application/json');
}
function exportCsv(){
  const rows=[['Date','Category','Amount','Odometer(km)','Note','Lat','Lon']];
  expenses.slice().sort((a,b)=>a.ts-b.ts).forEach(e=>{
    rows.push([fmtDate(e.ts), e.category, parseFloat(e.amount).toFixed(2), e.odo||'', (e.note||'').replace(/,/g,';'), e.lat||'', e.lon||'']);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  shareOrDownload('roadbook-expenses-'+new Date().toISOString().slice(0,10)+'.csv', csv, 'text/csv');
}
function importJson(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!confirm('This replaces all data currently on this device with the backup file. Continue?')) return;
      await idClear('entries'); await idClear('expenses'); await idClear('photos');
      await idClear('vehicles'); await idClear('trips'); await idClear('tracks');
      for(const x of data.entries||[]) await idPut('entries',x);
      for(const x of data.expenses||[]) await idPut('expenses',x);
      for(const x of data.photos||[]) await idPut('photos',x);
      for(const x of data.vehicles||[]) await idPut('vehicles',x);
      for(const x of data.trips||[]) await idPut('trips',x);
      for(const x of data.tracks||[]) await idPut('tracks',x);
      await loadAll(); render(); toast('Backup restored');
    }catch(err){ toast('Could not read that file'); }
  };
  reader.readAsText(file);
  e.target.value='';
}
async function wipeAll(){
  if(!confirm('Erase all data from this device? This cannot be undone. Your Drive sync copy (if connected) is not touched.')) return;
  await idClear('entries'); await idClear('expenses'); await idClear('photos'); await idClear('tombstones');
  await idClear('vehicles'); await idClear('trips'); await idClear('tracks');
  await loadAll(); render(); toast('All data erased');
}

/* ---------- Google Drive sync ---------- */
const GOOGLE_CLIENT_ID='230651067833-9nm4ek3r5n6hgqjrfm3ff8ebmhpg5ue2.apps.googleusercontent.com';
const DRIVE_SCOPE='https://www.googleapis.com/auth/drive.file';
const SYNC_FILENAME='roadbook-sync.json';
const DRIVE_FILES='https://www.googleapis.com/drive/v3/files';
const DRIVE_UPLOAD='https://www.googleapis.com/upload/drive/v3/files';

let tokenClient=null, accessToken=null;
let syncFileId=localStorage.getItem('rb_syncFileId')||null;
let googleConnected=localStorage.getItem('rb_googleConnected')==='1';
let lastSyncAt=localStorage.getItem('rb_lastSyncAt')||null;
let syncInFlight=false, syncQueued=false, syncDebounceTimer=null;

function waitForGis(timeoutMs=6000){
  return new Promise(resolve=>{
    const start=Date.now();
    (function poll(){
      if(window.google && google.accounts && google.accounts.oauth2){ resolve(true); return; }
      if(Date.now()-start>timeoutMs){ resolve(false); return; }
      setTimeout(poll,150);
    })();
  });
}
function initGis(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,
    scope:DRIVE_SCOPE,
    callback:''
  });
}
async function ensureTokenClient(){
  if(tokenClient) return true;
  const ready=await waitForGis(8000);
  if(ready && !tokenClient) initGis();
  return !!tokenClient;
}
function requestToken(interactive){
  return new Promise(async(resolve,reject)=>{
    const ok=await ensureTokenClient();
    if(!ok || !tokenClient){ reject(new Error('unavailable')); return; }
    let settled=false;
    const to=setTimeout(()=>{ if(!settled){settled=true; reject(new Error('timeout'));} }, interactive?60000:6000);
    tokenClient.callback=(resp)=>{
      if(settled) return; settled=true; clearTimeout(to);
      if(resp && resp.error){ reject(resp); return; }
      accessToken=resp.access_token;
      resolve(accessToken);
    };
    try{
      tokenClient.requestAccessToken({prompt: interactive?'consent':''});
    }catch(err){ if(!settled){settled=true; clearTimeout(to); reject(err);} }
  });
}
function setSyncStatus(msg){
  const el=document.getElementById('syncStatus');
  if(el) el.textContent=msg;
}

async function findSyncFile(){
  if(syncFileId) return syncFileId;
  const q=encodeURIComponent("name='"+SYNC_FILENAME+"' and trashed=false");
  const res=await fetch(`${DRIVE_FILES}?q=${q}&spaces=drive&fields=files(id,modifiedTime)`,{
    headers:{Authorization:'Bearer '+accessToken}
  });
  if(!res.ok) throw new Error('drive list failed: '+res.status);
  const data=await res.json();
  if(data.files && data.files.length){
    syncFileId=data.files[0].id;
    localStorage.setItem('rb_syncFileId', syncFileId);
    return syncFileId;
  }
  return null;
}
async function downloadRemote(fileId){
  if(!fileId) return null;
  const res=await fetch(`${DRIVE_FILES}/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+accessToken}});
  if(res.status===404) return null;
  if(!res.ok) throw new Error('drive download failed: '+res.status);
  const text=await res.text();
  if(!text) return null;
  try{ return JSON.parse(text); }catch(e){ return null; }
}
async function uploadRemote(fileId, payload){
  const body=JSON.stringify(payload);
  if(fileId){
    const res=await fetch(`${DRIVE_UPLOAD}/${fileId}?uploadType=media`,{
      method:'PATCH',
      headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},
      body
    });
    if(!res.ok) throw new Error('drive update failed: '+res.status);
    return fileId;
  }
  const boundary='rbsync'+Date.now();
  const metadata=JSON.stringify({name:SYNC_FILENAME});
  const multipartBody=
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${metadata}\r\n`+
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n`+
    `--${boundary}--`;
  const res=await fetch(`${DRIVE_UPLOAD}?uploadType=multipart`,{
    method:'POST',
    headers:{Authorization:'Bearer '+accessToken,'Content-Type':`multipart/related; boundary=${boundary}`},
    body:multipartBody
  });
  if(!res.ok) throw new Error('drive create failed: '+res.status);
  const data=await res.json();
  syncFileId=data.id;
  localStorage.setItem('rb_syncFileId', syncFileId);
  return syncFileId;
}

function unionById(localArr, remoteArr){
  const map=new Map();
  for(const x of localArr) map.set(x.id,x);
  for(const x of remoteArr) if(!map.has(x.id)) map.set(x.id,x);
  return [...map.values()];
}
function applyTombstones(arr, tsIds){
  return arr.filter(x=>!tsIds.has(x.id));
}
function mergeVehicles(localArr, remoteArr){
  const map=new Map();
  for(const x of localArr) map.set(x.id,x);
  for(const x of remoteArr){
    const cur=map.get(x.id);
    if(!cur || (x.updatedAt||0) > (cur.updatedAt||0)) map.set(x.id,x);
  }
  return [...map.values()];
}

async function syncNow(interactive){
  if(!googleConnected && !interactive) return;
  if(syncInFlight){ syncQueued=true; return; }
  syncInFlight=true;
  setSyncStatus('Syncing…');
  try{
    if(!accessToken){
      await requestToken(interactive);
    }
    let fileId;
    try{
      fileId=await findSyncFile();
    }catch(err){
      accessToken=null;
      await requestToken(interactive);
      fileId=await findSyncFile();
    }
    const remote=await downloadRemote(fileId);
    const remoteEntries=remote?.entries||[], remoteExpenses=remote?.expenses||[], remotePhotos=remote?.photos||[], remoteTombstones=remote?.tombstones||[];
    const remoteVehicles=remote?.vehicles||[], remoteTrips=remote?.trips||[], remoteTracks=remote?.tracks||[];

    const mergedTombstones=unionById(tombstones, remoteTombstones);
    const tsIds=new Set(mergedTombstones.map(t=>t.id));
    const mergedEntries=applyTombstones(unionById(entries, remoteEntries), tsIds);
    const mergedExpenses=applyTombstones(unionById(expenses, remoteExpenses), tsIds);
    const mergedPhotos=applyTombstones(unionById(photos, remotePhotos), tsIds);
    const mergedTrips=applyTombstones(unionById(trips, remoteTrips), tsIds);
    const mergedTracks=applyTombstones(unionById(tracks, remoteTracks), tsIds);
    const mergedVehicles=mergeVehicles(vehicles, remoteVehicles);

    await idClear('entries'); for(const x of mergedEntries) await idPut('entries',x);
    await idClear('expenses'); for(const x of mergedExpenses) await idPut('expenses',x);
    await idClear('photos'); for(const x of mergedPhotos) await idPut('photos',x);
    await idClear('tombstones'); for(const x of mergedTombstones) await idPut('tombstones',x);
    await idClear('vehicles'); for(const x of mergedVehicles) await idPut('vehicles',x);
    await idClear('trips'); for(const x of mergedTrips) await idPut('trips',x);
    await idClear('tracks'); for(const x of mergedTracks) await idPut('tracks',x);
    await loadAll();
    render();

    const newFileId=await uploadRemote(fileId, {entries:mergedEntries, expenses:mergedExpenses, photos:mergedPhotos, tombstones:mergedTombstones, vehicles:mergedVehicles, trips:mergedTrips, tracks:mergedTracks, updatedAt:Date.now()});
    if(!syncFileId) syncFileId=newFileId;

    lastSyncAt=Date.now();
    localStorage.setItem('rb_lastSyncAt', String(lastSyncAt));
    googleConnected=true;
    localStorage.setItem('rb_googleConnected','1');
    setSyncStatus('');
    if(activeTab==='more' && moreView==='backup') renderBackup(document.getElementById('main'));
  }catch(err){
    setSyncStatus('');
    if(interactive) toast('Sync failed — check connection or reconnect');
    console.warn('roadbook sync error', err);
  }finally{
    syncInFlight=false;
    if(syncQueued){ syncQueued=false; syncNow(false); }
  }
}
function scheduleSync(){
  if(!googleConnected) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer=setTimeout(()=>syncNow(false), 1500);
}

async function connectGoogle(){
  setSyncStatus('Connecting…');
  const ok=await ensureTokenClient();
  if(!ok){ setSyncStatus(''); toast('Google sign-in unavailable — check connection'); return; }
  try{
    await requestToken(true);
    googleConnected=true;
    localStorage.setItem('rb_googleConnected','1');
    await syncNow(true);
    toast('Google connected');
  }catch(err){
    setSyncStatus('');
    toast('Could not connect Google account');
  }
  if(activeTab==='more' && moreView==='backup') renderBackup(document.getElementById('main'));
}
function disconnectGoogle(){
  if(!confirm('Disconnect Google account? Your data on this device is kept — you can reconnect any time.')) return;
  if(accessToken && window.google && google.accounts && google.accounts.oauth2 && google.accounts.oauth2.revoke){
    google.accounts.oauth2.revoke(accessToken, ()=>{});
  }
  accessToken=null; googleConnected=false; syncFileId=null; lastSyncAt=null;
  localStorage.removeItem('rb_googleConnected');
  localStorage.removeItem('rb_syncFileId');
  localStorage.removeItem('rb_lastSyncAt');
  toast('Google account disconnected');
  if(activeTab==='more' && moreView==='backup') renderBackup(document.getElementById('main'));
}

/* ---------- tabs ---------- */
function setActiveTabUI(){
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===activeTab));
  updateFabVisibility();
}
document.querySelectorAll('nav.tabs button').forEach(b=>{
  b.addEventListener('click',()=>{ activeTab=b.dataset.tab; if(activeTab!=='more') moreView=null; setActiveTabUI(); render(); });
});

/* ---------- boot ---------- */
(async function(){
  const dbTimeout=setTimeout(showDbBlockedMessage,6000);
  await openDB();
  clearTimeout(dbTimeout);
  await loadAll();
  setActiveTabUI();
  render();
  if(await waitForGis()){
    initGis();
    if(googleConnected) syncNow(false);
  }
  window.addEventListener('online', ()=>{ if(googleConnected) scheduleSync(); });
})();
